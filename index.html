<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>원고지 쓰기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Nanum+Myeongjo:wght@400;700&family=Nanum+Gothic:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --grid-color: #c0392b;
  --cell-size: 35px;
  --font-size: 22px;
  --font-family: 'Noto Serif KR', serif;
  --toolbar-height: 56px;
}

html, body {
  width: 100%;
  height: 100%;
  background: #e8e4df;
  font-family: var(--font-family);
  overflow: hidden;
}

/* ===== TOOLBAR ===== */
.toolbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  min-height: var(--toolbar-height);
  background: #2c2c2c;
  color: #fff;
  z-index: 1000;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  font-family: 'Noto Sans KR', sans-serif;
}

.toolbar-left {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 0 0 auto;
  min-width: 0;
}

.toolbar-title {
  font-size: 15px;
  font-weight: 700;
  color: #fff;
  white-space: nowrap;
}

.menu-toggle {
  display: none;
  width: 42px; min-width: 42px; height: 40px;
  padding: 0 !important;
  font-size: 18px; line-height: 1;
  justify-content: center; align-items: center;
  flex: 0 0 42px;
}

.toolbar-menu {
  flex: 1 1 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  min-width: 0;
  overflow: visible;
}

.toolbar-group {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: nowrap;
  min-width: 0;
}

.toolbar button,
.toolbar select {
  background: #444;
  color: #fff;
  border: 1px solid #555;
  border-radius: 8px;
  padding: 8px 11px;
  font-size: 13px;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}
.toolbar button:hover, .toolbar select:hover { background: #555; }

.toolbar select {
  min-width: 150px;
  text-align: center;
  text-align-last: center;
  appearance: auto;
}

.btn-primary {
  background: #2980b9 !important;
  border-color: #3498db !important;
  font-weight: 700;
}
.btn-primary:hover { background: #3498db !important; }

.color-set {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #3a3a3a;
  border: 1px solid #555;
  border-radius: 10px;
  padding: 6px 8px;
  flex: 0 0 auto;
}

.color-btn {
  width: 28px !important; height: 28px !important;
  min-width: 28px !important; min-height: 28px !important;
  border-radius: 50% !important;
  padding: 0 !important;
  border: 2px solid #777 !important;
  flex: 0 0 28px !important;
  aspect-ratio: 1 / 1;
  box-sizing: border-box;
}
.color-btn.active {
  border-color: #fff !important;
  box-shadow: 0 0 0 2px rgba(255,255,255,0.18);
}
.color-red      { background: #c0392b !important; }
.color-darkgray { background: #555555 !important; }
.color-black    { background: #222222 !important; }

.zoom-control {
  display: inline-flex;
  align-items: center;
  background: #444;
  border-radius: 8px;
  border: 1px solid #555;
  overflow: hidden;
  flex: 0 0 auto;
}
.zoom-control button {
  border: none; border-radius: 0;
  background: transparent;
  padding: 8px 10px; min-width: 34px;
}
.zoom-control button:hover { background: #555; }
.zoom-label {
  font-size: 12px; min-width: 48px;
  text-align: center; padding: 0 6px;
  pointer-events: none; color: #f0f0f0;
}

.action-links {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: nowrap;
}

.tool-divider {
  width: 1px; height: 28px;
  background: rgba(255,255,255,0.12);
  margin: 0 2px;
  flex: 0 0 auto;
}

/* ===== COMPACT MODE ===== */
.toolbar.compact .menu-toggle { display: inline-flex; }

.toolbar.compact .toolbar-menu {
  display: none;
  position: absolute;
  top: calc(var(--toolbar-height) + 6px);
  left: 12px; right: auto;
  width: min(360px, calc(100vw - 24px));
  background: #2c2c2c;
  padding: 12px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.32);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  flex-direction: column;
  align-items: stretch;
  justify-content: flex-start;
  gap: 12px;
  max-height: calc(100vh - var(--toolbar-height) - 16px);
  overflow-y: auto;
}
.toolbar.compact .toolbar-menu.open { display: flex; }

.toolbar.compact .toolbar-group {
  width: 100%;
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
}
.toolbar.compact button,
.toolbar.compact select {
  width: 100%; min-height: 42px;
  font-size: 14px; justify-content: center;
}
.toolbar.compact select { text-align: center; text-align-last: center; }
.toolbar.compact .color-set { width: 100%; justify-content: center; padding: 8px 10px; }
.toolbar.compact .color-btn {
  width: 28px !important; height: 28px !important;
  min-width: 28px !important; min-height: 28px !important;
  flex: 0 0 28px !important; border-radius: 50% !important;
}
.toolbar.compact .zoom-control { width: 100%; justify-content: stretch; }
.toolbar.compact .zoom-control button { flex: 1 1 0; }
.toolbar.compact .zoom-label {
  flex: 0 0 64px;
  display: flex; align-items: center; justify-content: center;
}
.toolbar.compact .action-links {
  width: 100%;
  display: grid; grid-template-columns: 1fr; gap: 8px;
}
.toolbar.compact .tool-divider { display: none; }
.toolbar:not(.compact) .menu-toggle { display: none !important; }

@media (max-width: 640px) {
  .toolbar.compact .toolbar-menu {
    left: 0; right: 0;
    top: calc(var(--toolbar-height) - 2px);
    width: auto;
    border-radius: 0 0 14px 14px;
    border-left: none; border-right: none;
  }
}
@media (max-width: 480px) {
  .toolbar-title { font-size: 14px; }
  .menu-toggle { width: 40px; min-width: 40px; height: 38px; flex-basis: 40px; }
}

/* ===== PAGE AREA ===== */
.page-container {
  position: fixed;
  top: var(--toolbar-height);
  left: 0; right: 0; bottom: 0;
  padding: 28px 0 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  touch-action: pan-y;
}

.zoom-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 40px;
  transform-origin: top center;
  transition: transform 0.2s ease-out;
  width: 100%;
  min-height: min-content;
}

.page {
  background: #fff;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  position: relative;
  width: 794px; height: 1123px;
  padding: 60px 47px;
  flex-shrink: 0;
}

.page-header {
  display: flex;
  justify-content: flex-end;
  align-items: baseline;
  padding: 0 4px 10px 0;
  font-family: 'Noto Serif KR', serif;
  color: #333; font-size: 14px; gap: 6px;
}
.page-header .page-no-label { font-size: 12px; color: #555; letter-spacing: 1px; }
.page-header .page-no { font-size: 24px; font-weight: 700; color: #333; }

/* ===== GRID ===== */
.grid-wrapper {
  display: flex;
  flex-direction: column;
  gap: 8px;
  width: fit-content;
  margin: 0 auto;
}
.grid-row {
  display: flex;
  border: 2px solid var(--grid-color);
  position: relative;
}
.grid-cell {
  width: var(--cell-size); height: var(--cell-size);
  flex: 0 0 var(--cell-size);
  border-right: 1px solid var(--grid-color);
  box-sizing: border-box;
  display: flex;
  align-items: center; justify-content: center;
  font-size: var(--font-size);
  font-family: var(--font-family);
  cursor: text;
  position: relative;
  line-height: 1; color: #111;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}
.grid-row .grid-cell:last-child { border-right: none; }

.overflow-cell {
  position: absolute;
  right: calc(var(--cell-size) * -1);
  top: 0;
  width: var(--cell-size); height: var(--cell-size);
  display: flex;
  align-items: center; justify-content: center;
  font-size: var(--font-size);
  color: #111;
  pointer-events: none;
}

.grid-cell.cursor-cell { background: rgba(66,133,244,0.15); }
.grid-cell.cursor-cell::after {
  content: '';
  position: absolute;
  left: 2px; top: 15%; bottom: 15%;
  width: 2px;
  background: #2962ff;
  animation: blink 1s step-end infinite;
}
.grid-cell.selected-cell {
  background: rgba(66,133,244,0.12);
}
.grid-cell.selection-focus-cell {
  box-shadow: inset 0 0 0 2px rgba(41,98,255,0.25);
}
.grid-cell.composing-cell {
  background: rgba(255,193,7,0.2);
}
.grid-cell.composing-cell .cell-char {
  border-bottom: 2px solid #f57c00;
  padding-bottom: 1px;
}

/* 마침표, 쉼표 좌측 하단 정렬 스타일 */
.grid-cell.punct-left {
  justify-content: flex-start;
  align-items: flex-end;
  padding-left: 6px;
  padding-bottom: 4px;
}

@keyframes blink {
  0%,100% { opacity:1; }
  50% { opacity:0; }
}

/* ===== HIDDEN INPUT ===== */
#hiddenInput {
  position: fixed;
  left: -100vw;
  top: 50%;
  transform: translateY(-50%);
  width: 100vw;
  height: 2.5em;
  opacity: 0;
  font-size: 16px;
  border: none;
  outline: none;
  resize: none;
  z-index: 1;
  padding: 0.2em;
  color: transparent;
  background: transparent;
  caret-color: transparent;
  -webkit-appearance: none;
  appearance: none;
}

/* ===== TOAST ===== */
.toast {
  position: fixed;
  bottom: 30px; left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.82);
  color: #fff;
  padding: 12px 24px;
  border-radius: 999px;
  font-size: 14px;
  opacity: 0;
  transition: opacity 0.25s;
  z-index: 9999;
  font-family: 'Noto Sans KR', sans-serif;
  pointer-events: none;
}
.toast.show { opacity: 1; }

/* ===== PRINT ===== */
@media print {
  @page {
    size: A4 portrait;
    margin: 0;
  }

  html, body {
    width: auto !important;
    height: auto !important;
    overflow: visible !important;
    background: #fff !important;
    margin: 0 !important;
    padding: 0 !important;
  }

  .toolbar, .toast, #hiddenInput {
    display: none !important;
  }

  .page-container {
    position: static !important;
    padding: 0 !important;
    display: block !important;
    width: auto !important;
    height: auto !important;
    overflow: visible !important;
  }

  .zoom-wrapper {
    transform: none !important;
    display: block !important;
    width: auto !important;
    height: auto !important;
    overflow: visible !important;
    gap: 0 !important;
  }

  .page {
    width: 210mm !important;
    height: 297mm !important;
    margin: 0 !important;
    padding: 60px 47px !important;
    box-shadow: none !important;
    overflow: hidden !important;
    page-break-after: always;
    break-after: page;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .page:last-child {
    page-break-after: auto;
    break-after: auto;
  }

  .page-header {
    display: flex !important;
    justify-content: flex-end !important;
    align-items: baseline !important;
    gap: 6px !important;
    width: auto !important;
    text-align: right !important;
    padding: 0 4px 10px 0 !important;
  }
  .page-header .page-no-label,
  .page-header .page-no {
    width: auto !important;
    display: inline !important;
    flex: none !important;
    text-align: inherit !important;
  }
}
</style>
</head>
<body>

<div class="toolbar" id="toolbar">
  <div class="toolbar-left">
    <button class="menu-toggle" id="menuToggle" onclick="toggleMenu()">☰</button>
    <div class="toolbar-title">원고지 쓰기</div>
  </div>

  <div class="toolbar-menu" id="toolbarMenu">
    <div class="toolbar-group">
      <button onclick="newDocument()">📄 새 문서</button>
      <select id="fontSelect" onchange="changeFont(this.value)" title="글꼴">
        <option value="'Noto Serif KR', serif">명조 (Noto Serif)</option>
        <option value="'Nanum Myeongjo', serif">나눔명조</option>
        <option value="'Noto Sans KR', sans-serif">고딕 (Noto Sans)</option>
        <option value="'Nanum Gothic', sans-serif">나눔고딕</option>
      </select>
      <div class="color-set" title="원고지 색깔">
        <button class="color-btn color-red active"  data-color="#c0392b" onclick="changeColor(this)" title="빨강"></button>
        <button class="color-btn color-darkgray"    data-color="#555555" onclick="changeColor(this)" title="회색"></button>
        <button class="color-btn color-black"       data-color="#222222" onclick="changeColor(this)" title="검정"></button>
      </div>
    </div>

    <div class="tool-divider"></div>

    <div class="toolbar-group">
      <div class="zoom-control">
        <button onclick="setZoom('out')" title="축소">－</button>
        <span class="zoom-label" id="zoomLabel">100%</span>
        <button onclick="setZoom('in')"  title="확대">＋</button>
      </div>
      <button onclick="setZoom('width')">너비맞춤</button>
      <button onclick="setZoom('height')">높이맞춤</button>
    </div>

    <div class="tool-divider"></div>

    <div class="toolbar-group action-links">
      <button class="btn-primary" onclick="doPrint()">🖨️ 인쇄</button>
      <button onclick="copyURL()">🔗 현재 문서 주소 복사</button>
      <button onclick="copyText()">📋 텍스트만 복사</button>
    </div>
  </div>
</div>

<div class="page-container" id="pageContainer">
  <div class="zoom-wrapper" id="zoomWrapper"></div>
</div>

<textarea id="hiddenInput"
  autocomplete="off" autocorrect="off"
  autocapitalize="off" spellcheck="false"></textarea>

<div class="toast" id="toast"></div>

<script>
const COLS = 20, ROWS = 20;

let state = {
  chars: [],
  cursorPos: 0,
  selectionStart: 0,
  selectionEnd: 0,
  font: "'Noto Serif KR', serif",
  color: '#c0392b',
  composing: false
};

let zoomState = { mode: 'width', scale: 1.0 };

const SENTINEL = '\u200B';
const SENTINEL_LEN = SENTINEL.length;

const scroller = document.getElementById('pageContainer');
const input    = document.getElementById('hiddenInput');
const supportsBeforeInput = 'onbeforeinput' in input;

const MANUAL_BEFOREINPUT_TYPES = new Set([
  'deleteContentBackward',
  'deleteContentForward',
  'deleteWordBackward',
  'deleteWordForward',
  'insertParagraph',
  'insertLineBreak'
]);

/* ===== 유틸 ===== */
function clamp(n, min, max) {
  return Math.max(min, Math.min(max, n));
}

function normalizeText(text) {
  return String(text ?? '')
    .replace(/\r\n?/g, '\n')
    .replace(/\u200B/g, '');
}

function hasSelection() {
  return state.selectionStart !== state.selectionEnd;
}

function getSelectedText() {
  const start = Math.min(state.selectionStart, state.selectionEnd);
  const end   = Math.max(state.selectionStart, state.selectionEnd);
  return state.chars.slice(start, end).join('');
}

function setLogicalSelection(start, end = start, opts = {}) {
  const max = state.chars.length;
  const s = clamp(Math.min(start, end), 0, max);
  const e = clamp(Math.max(start, end), 0, max);

  state.selectionStart = s;
  state.selectionEnd   = e;
  state.cursorPos      = e;

  if (opts.syncInput)  syncInputFromState();
  if (opts.renderView) render();
  if (opts.scroll)     scrollToCursor();
  if (opts.focus)      focusInput();
}

// 연속된 마침표 3개(...)를 말줄임표(…) 하나로 변환하는 함수
function applyAutoReplace() {
  let text = state.chars.join('');
  if (!text.includes('...')) return false;

  let changed = false;
  let start = state.selectionStart;
  let end = state.selectionEnd;

  while (text.includes('...')) {
    const idx = text.indexOf('...');
    text = text.substring(0, idx) + '…' + text.substring(idx + 3);
    changed = true;

    // 문자 길이가 줄어들었으므로 커서 위치를 논리적으로 조정
    if (start > idx + 2) start -= 2;
    else if (start > idx) start = idx + 1;

    if (end > idx + 2) end -= 2;
    else if (end > idx) end = idx + 1;
  }

  state.chars = text.split('');
  state.selectionStart = start;
  state.selectionEnd = end;
  state.cursorPos = end;

  return changed;
}

function replaceRangeInState(start, end, text) {
  const max = state.chars.length;
  const s = clamp(Math.min(start, end), 0, max);
  const e = clamp(Math.max(start, end), 0, max);
  const safe = normalizeText(text);

  state.chars.splice(s, e - s, ...safe.split(''));
  const next = s + safe.length;
  setLogicalSelection(next, next);
  return true;
}

function deleteRangeInState(start, end) {
  const s = Math.min(start, end);
  const e = Math.max(start, end);
  if (s === e) return false;
  state.chars.splice(s, e - s);
  setLogicalSelection(s, s);
  return true;
}

function deleteBackwardInState() {
  if (hasSelection()) {
    return deleteRangeInState(state.selectionStart, state.selectionEnd);
  }
  if (state.cursorPos <= 0) return false;
  state.chars.splice(state.cursorPos - 1, 1);
  setLogicalSelection(state.cursorPos - 1, state.cursorPos - 1);
  return true;
}

function deleteForwardInState() {
  if (hasSelection()) {
    return deleteRangeInState(state.selectionStart, state.selectionEnd);
  }
  if (state.cursorPos >= state.chars.length) return false;
  state.chars.splice(state.cursorPos, 1);
  setLogicalSelection(state.cursorPos, state.cursorPos);
  return true;
}

function deleteWordBackwardInState() {
  if (hasSelection()) {
    return deleteRangeInState(state.selectionStart, state.selectionEnd);
  }
  const text = state.chars.join('');
  let i = state.cursorPos;
  if (i <= 0) return false;

  while (i > 0 && /\s/.test(text[i - 1])) i--;
  while (i > 0 && !/\s/.test(text[i - 1])) i--;

  return deleteRangeInState(i, state.cursorPos);
}

function deleteWordForwardInState() {
  if (hasSelection()) {
    return deleteRangeInState(state.selectionStart, state.selectionEnd);
  }
  const text = state.chars.join('');
  let i = state.cursorPos;
  if (i >= text.length) return false;

  while (i < text.length && /\s/.test(text[i])) i++;
  while (i < text.length && !/\s/.test(text[i])) i++;

  return deleteRangeInState(state.cursorPos, i);
}

function afterStateEdit(save = true) {
  applyAutoReplace();
  render();
  syncInputFromState();
  if (save) saveToURL();
  scrollToCursor();
}

/* ===== hidden textarea 동기화 ===== */
function ensureSentinel() {
  if (input.value.startsWith(SENTINEL)) return;

  const start = input.selectionStart ?? 0;
  const end   = input.selectionEnd ?? start;

  input.value = SENTINEL + input.value.split(SENTINEL).join('');

  try {
    input.setSelectionRange(
      Math.max(SENTINEL_LEN, start + SENTINEL_LEN),
      Math.max(SENTINEL_LEN, end   + SENTINEL_LEN)
    );
  } catch (e) {}
}

function clampNativeSelection() {
  const valueLen = input.value.length;
  let start = input.selectionStart ?? SENTINEL_LEN;
  let end   = input.selectionEnd   ?? start;

  start = clamp(start, SENTINEL_LEN, valueLen);
  end   = clamp(end,   SENTINEL_LEN, valueLen);

  if (start > end) [start, end] = [end, start];

  if (input.selectionStart !== start || input.selectionEnd !== end) {
    try { input.setSelectionRange(start, end); } catch (e) {}
  }

  return { start, end };
}

function syncInputFromState() {
  const text = state.chars.join('');
  const nextValue = SENTINEL + text;

  if (input.value !== nextValue) input.value = nextValue;

  const s = SENTINEL_LEN + clamp(state.selectionStart, 0, state.chars.length);
  const e = SENTINEL_LEN + clamp(state.selectionEnd,   0, state.chars.length);

  try { input.setSelectionRange(s, e); } catch (e) {}
}

function syncStateFromInput() {
  ensureSentinel();

  const text = normalizeText(input.value.slice(SENTINEL_LEN));
  state.chars = text.split('');

  const { start, end } = clampNativeSelection();
  setLogicalSelection(start - SENTINEL_LEN, end - SENTINEL_LEN);

  if (!state.composing && applyAutoReplace()) {
    syncInputFromState();
  }
}

function syncFromNativeInput(save = true) {
  syncStateFromInput();
  render();
  if (save) saveToURL();
  scrollToCursor();
}

/* ===== LZ ===== */
const LZ = {
  compress(str) {
    if (!str) return '';
    try {
      const bytes = new TextEncoder().encode(str);
      let bin = '';
      bytes.forEach(b => bin += String.fromCharCode(b));
      return btoa(bin).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
    } catch(e) { return ''; }
  },
  decompress(b64) {
    if (!b64) return '';
    try {
      b64 = b64.replace(/-/g,'+').replace(/_/g,'/');
      while (b64.length % 4) b64 += '=';
      const bin = atob(b64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return new TextDecoder().decode(bytes);
    } catch(e) { return ''; }
  }
};

/* ===== URL 저장 / 불러오기 ===== */
function saveToURL() {
  const hash = LZ.compress(JSON.stringify({
    t: state.chars.join(''),
    f: state.font,
    c: state.color
  }));
  history.replaceState(null, '', '#' + hash);
}

function loadFromURL() {
  const hash = location.hash.slice(1);
  if (!hash) return;
  try {
    const data = JSON.parse(LZ.decompress(hash));
    state.chars = data.t ? data.t.split('') : [];
    state.font  = data.f || state.font;
    state.color = data.c || state.color;
    state.cursorPos = 0;
    state.selectionStart = 0;
    state.selectionEnd = 0;
    applySettings();
  } catch(e) {}
}

function applySettings() {
  document.documentElement.style.setProperty('--font-family', state.font);
  document.documentElement.style.setProperty('--grid-color',  state.color);
  document.getElementById('fontSelect').value = state.font;
  document.querySelectorAll('.color-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.color === state.color);
  });
}

/* ===== 레이아웃 계산 ===== */
function buildLayout() {
  const displayChars = state.chars.slice();
  const mapToLogical = (dispIdx) => dispIdx;

  const pages = [];
  let page = { rows: [] };
  let row  = { cells: [], overflow: null, isNewlineEnded: false, newlineLogicalIdx: -1 };
  const cursorDisplayIdx = state.cursorPos;

  for (let i = 0; i < displayChars.length; i++) {
    const ch = displayChars[i];

    if (ch === '\n') {
      row.isNewlineEnded    = true;
      row.newlineLogicalIdx = mapToLogical(i);
      page.rows.push(row);
      if (page.rows.length === ROWS) { pages.push(page); page = { rows: [] }; }
      row = { cells: [], overflow: null, isNewlineEnded: false, newlineLogicalIdx: -1 };
      continue;
    }

    row.cells.push({ char: ch, logicalIdx: mapToLogical(i), dispIdx: i });

    if (row.cells.length === COLS) {
      const nextCh = displayChars[i + 1];
      if (nextCh && nextCh !== '\n' && /^[.,?!'"\u2018\u2019\u201C\u201D ]$/.test(nextCh)) {
        row.overflow = { char: nextCh, logicalIdx: mapToLogical(i + 1), dispIdx: i + 1 };
        i++;
      }
      page.rows.push(row);
      if (page.rows.length === ROWS) { pages.push(page); page = { rows: [] }; }
      row = { cells: [], overflow: null, isNewlineEnded: false, newlineLogicalIdx: -1 };
    }
  }

  if (row.cells.length > 0 || displayChars[displayChars.length - 1] === '\n' || displayChars.length === 0) {
    page.rows.push(row);
  }
  if (page.rows.length > 0) pages.push(page);
  if (pages.length === 0) {
    pages.push({ rows: [{ cells: [], overflow: null, isNewlineEnded: false, newlineLogicalIdx: -1 }] });
  }

  let lastLogical = 0;
  for (let pIdx = 0; pIdx < pages.length; pIdx++) {
    const p = pages[pIdx];
    while (p.rows.length < ROWS) {
      p.rows.push({ cells: [], overflow: null, isNewlineEnded: false, newlineLogicalIdx: -1 });
    }
    for (let rIdx = 0; rIdx < ROWS; rIdx++) {
      const r = p.rows[rIdx];
      for (let cIdx = 0; cIdx < COLS; cIdx++) {
        if (r.cells[cIdx]) {
          lastLogical = r.cells[cIdx].logicalIdx + 1;
        } else {
          r.cells[cIdx] = {
            char: '',
            logicalIdx: (r.isNewlineEnded && !r.overflow) ? r.newlineLogicalIdx : lastLogical,
            dispIdx: -1,
            empty: true
          };
        }
      }
      if (r.overflow)       lastLogical = r.overflow.logicalIdx + 1;
      if (r.isNewlineEnded) lastLogical = r.newlineLogicalIdx + 1;
    }
  }

  return { pages, cursorDisplayIdx };
}

/* ===== 렌더 ===== */
function render() {
  const layout  = buildLayout();
  const wrapper = document.getElementById('zoomWrapper');
  const selectionActive = hasSelection();

  while (wrapper.children.length < layout.pages.length) wrapper.appendChild(createPage(wrapper.children.length));
  while (wrapper.children.length > layout.pages.length) wrapper.removeChild(wrapper.lastChild);

  let foundCursor = false;

  for (let pIdx = 0; pIdx < layout.pages.length; pIdx++) {
    const pageData = layout.pages[pIdx];
    const pageEl   = wrapper.children[pIdx];
    pageEl.querySelector('.page-no').textContent = pIdx + 1;
    const gridRows = pageEl.querySelectorAll('.grid-row');

    for (let rIdx = 0; rIdx < ROWS; rIdx++) {
      const rowData = pageData.rows[rIdx];
      const rowEl   = gridRows[rIdx];
      const cells   = rowEl.querySelectorAll('.grid-cell');

      for (let cIdx = 0; cIdx < COLS; cIdx++) {
        const cellData = rowData.cells[cIdx];
        const cellEl   = cells[cIdx];
        cellEl.querySelector('.cell-char').textContent = cellData.char;
        cellEl.dataset.logicalIdx = cellData.logicalIdx;

        let isCursor = false;
        if (!selectionActive && !foundCursor) {
          if (cellData.dispIdx === layout.cursorDisplayIdx) {
            isCursor = true;
            foundCursor = true;
          } else if (cellData.empty && cellData.logicalIdx >= state.cursorPos) {
            isCursor = true;
            foundCursor = true;
          }
        }

        const isComposingChar =
          state.composing &&
          state.cursorPos > 0 &&
          !cellData.empty &&
          cellData.logicalIdx === state.cursorPos - 1;

        const isSelected =
          selectionActive &&
          !cellData.empty &&
          cellData.logicalIdx >= state.selectionStart &&
          cellData.logicalIdx < state.selectionEnd;

        const isSelectionFocus =
          selectionActive &&
          !cellData.empty &&
          cellData.logicalIdx === state.selectionEnd - 1;

        cellEl.className = 'grid-cell';
        if (isCursor && !state.composing && !selectionActive) cellEl.classList.add('cursor-cell');
        if (isSelected)                                       cellEl.classList.add('selected-cell');
        if (isSelectionFocus)                                 cellEl.classList.add('selection-focus-cell');
        if (isComposingChar)                                  cellEl.classList.add('composing-cell');
        if (cellData.char === '.' || cellData.char === ',')   cellEl.classList.add('punct-left');
      }

      let overflowEl = rowEl.querySelector('.overflow-cell');
      if (rowData.overflow) {
        if (!overflowEl) {
          overflowEl = document.createElement('div');
          overflowEl.className = 'overflow-cell';
          rowEl.appendChild(overflowEl);
        }
        overflowEl.textContent = rowData.overflow.char;
      } else if (overflowEl) {
        overflowEl.remove();
      }
    }
  }
}

function createPage(idx) {
  const page = document.createElement('div');
  page.className = 'page';
  let html = `<div class="page-header">
    <span class="page-no-label">NO.</span>
    <span class="page-no">${idx + 1}</span>
  </div><div class="grid-wrapper">`;
  for (let r = 0; r < ROWS; r++) {
    html += `<div class="grid-row">`;
    for (let c = 0; c < COLS; c++) html += `<div class="grid-cell"><span class="cell-char"></span></div>`;
    html += `</div>`;
  }
  html += `</div>`;
  page.innerHTML = html;
  return page;
}

/* ===== 포커스 ===== */
function focusInput() {
  input.focus({ preventScroll: true });
}

/* ===== 터치 / 포인터 ===== */
let touchStartX = 0, touchStartY = 0;

document.addEventListener('touchstart', (e) => {
  if (e.target.closest('.toolbar')) return;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  focusInput();
}, { passive: true });

document.addEventListener('touchend', (e) => {
  if (e.target.closest('.toolbar')) return;

  const t    = e.changedTouches[0];
  const dist = Math.hypot(t.clientX - touchStartX, t.clientY - touchStartY);

  if (dist < 12) {
    e.preventDefault();
    const cell = document.elementFromPoint(t.clientX, t.clientY)?.closest('.grid-cell');
    if (cell) {
      const idx = parseInt(cell.dataset.logicalIdx, 10);
      if (!isNaN(idx)) {
        state.composing = false;
        setLogicalSelection(idx, idx, { renderView: true, syncInput: true });
      }
    }
    focusInput();
  }
}, { passive: false });

document.addEventListener('pointerdown', (e) => {
  if (e.pointerType !== 'mouse') return;
  if (e.target.closest('.toolbar')) return;

  const cell = e.target.closest('.grid-cell');
  if (cell) {
    e.preventDefault();
    const idx = parseInt(cell.dataset.logicalIdx, 10);
    if (!isNaN(idx)) {
      state.composing = false;
      setLogicalSelection(idx, idx, { renderView: true, syncInput: true });
    }
  } else if (!e.target.closest('.page-container')) {
    return;
  }
  focusInput();
});

document.addEventListener('click', (e) => {
  const toolbar = document.getElementById('toolbar');
  const menu    = document.getElementById('toolbarMenu');
  if (toolbar.classList.contains('compact') && menu.classList.contains('open')) {
    if (!e.target.closest('#toolbarMenu') && !e.target.closest('#menuToggle')) {
      menu.classList.remove('open');
    }
  }
});

/* ===== IME / 입력 / 선택 범위 안정화 ===== */
let selectionSyncRAF = 0;

function scheduleSelectionSync(scroll = false) {
  if (selectionSyncRAF) cancelAnimationFrame(selectionSyncRAF);
  selectionSyncRAF = requestAnimationFrame(() => {
    selectionSyncRAF = 0;
    if (document.activeElement !== input) return;
    syncStateFromInput();
    render();
    if (scroll) scrollToCursor();
  });
}

input.addEventListener('focus', () => {
  ensureSentinel();
  syncInputFromState();
});

input.addEventListener('blur', () => {
  state.composing = false;
  render();
});

input.addEventListener('select', () => {
  scheduleSelectionSync(false);
});

document.addEventListener('selectionchange', () => {
  if (document.activeElement === input) {
    scheduleSelectionSync(false);
  }
});

input.addEventListener('beforeinput', (e) => {
  if (!MANUAL_BEFOREINPUT_TYPES.has(e.inputType)) return;

  syncStateFromInput();

  if (state.composing || e.isComposing) return;
  if (!e.cancelable) return;

  let changed = false;

  switch (e.inputType) {
    case 'deleteContentBackward':
      e.preventDefault();
      changed = deleteBackwardInState();
      break;

    case 'deleteContentForward':
      e.preventDefault();
      changed = deleteForwardInState();
      break;

    case 'deleteWordBackward':
      e.preventDefault();
      changed = deleteWordBackwardInState();
      break;

    case 'deleteWordForward':
      e.preventDefault();
      changed = deleteWordForwardInState();
      break;

    case 'insertParagraph':
    case 'insertLineBreak':
      e.preventDefault();
      changed = replaceRangeInState(state.selectionStart, state.selectionEnd, '\n');
      break;
  }

  if (changed) {
    afterStateEdit(true);
  } else {
    render();
    syncInputFromState();
  }
});

input.addEventListener('paste', (e) => {
  if (state.composing) return;
  const pasted = e.clipboardData?.getData('text/plain');
  if (typeof pasted !== 'string' || pasted.length === 0) return;

  e.preventDefault();
  syncStateFromInput();
  replaceRangeInState(state.selectionStart, state.selectionEnd, pasted);
  afterStateEdit(true);
});

input.addEventListener('cut', () => {
  requestAnimationFrame(() => {
    syncFromNativeInput(true);
  });
});

input.addEventListener('compositionstart', () => {
  state.composing = true;
  requestAnimationFrame(() => {
    syncStateFromInput();
    render();
    scrollToCursor();
  });
});

input.addEventListener('compositionupdate', () => {
  requestAnimationFrame(() => {
    syncStateFromInput();
    render();
    scrollToCursor();
  });
});

input.addEventListener('compositionend', () => {
  state.composing = false;
  requestAnimationFrame(() => {
    syncFromNativeInput(true);
  });
});

input.addEventListener('input', () => {
  syncFromNativeInput(!state.composing);
});

input.addEventListener('keydown', (e) => {
  const lowerKey = e.key.toLowerCase();
  const navKeys = new Set([
    'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown',
    'Home', 'End', 'PageUp', 'PageDown'
  ]);

  if ((e.metaKey || e.ctrlKey) && !e.altKey && lowerKey === 'a') {
    e.preventDefault();
    setLogicalSelection(0, state.chars.length, {
      renderView: true,
      syncInput: true,
      scroll: true
    });
    return;
  }

  if (navKeys.has(e.key)) {
    requestAnimationFrame(() => {
      syncStateFromInput();
      render();
      scrollToCursor();
    });
  }

  if (supportsBeforeInput) return;
  if (state.composing) return;

  let changed = false;

  if (e.key === 'Backspace') {
    e.preventDefault();
    syncStateFromInput();
    changed = deleteBackwardInState();
  } else if (e.key === 'Delete') {
    e.preventDefault();
    syncStateFromInput();
    changed = deleteForwardInState();
  } else if (e.key === 'Enter') {
    e.preventDefault();
    syncStateFromInput();
    changed = replaceRangeInState(state.selectionStart, state.selectionEnd, '\n');
  }

  if (changed) {
    afterStateEdit(true);
  }
});

input.addEventListener('keyup', (e) => {
  const keys = new Set([
    'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown',
    'Home', 'End', 'PageUp', 'PageDown', 'Shift'
  ]);
  if (keys.has(e.key)) {
    scheduleSelectionSync(true);
  }
});

function scrollToCursor() {
  requestAnimationFrame(() => {
    let el = document.querySelector('.cursor-cell, .composing-cell, .selection-focus-cell');

    if (!el) {
      const selected = document.querySelectorAll('.selected-cell');
      if (selected.length) el = selected[selected.length - 1];
    }

    if (!el) return;

    const containerRect = scroller.getBoundingClientRect();
    const rect          = el.getBoundingClientRect();
    const topLimit      = containerRect.top + 90;
    const bottomLimit   = containerRect.bottom - 70;

    if (rect.top < topLimit) {
      scroller.scrollBy({ top: rect.top - topLimit, behavior: 'smooth' });
    } else if (rect.bottom > bottomLimit) {
      scroller.scrollBy({ top: rect.bottom - bottomLimit, behavior: 'smooth' });
    }
  });
}

/* ===== ZOOM ===== */
function getVP() {
  const vp = window.visualViewport;
  return {
    w: Math.round(vp ? vp.width  : window.innerWidth),
    h: Math.round(vp ? vp.height : window.innerHeight)
  };
}

function initMobileZoom() {
  const { w, h } = getVP();
  if (w <= h) {
    setZoom('width');
  } else {
    zoomState = {
      mode: 'custom',
      scale: Math.min(2.0, Math.max(0.25, (w * 0.6) / 794))
    };
    applyZoom();
  }
}

function setZoom(action) {
  const { w, h } = getVP();
  const PAGE_W = 794 + 80;
  const PAGE_H = 1123 + 120;

  if      (action === 'in')     { zoomState.mode = 'custom'; zoomState.scale = Math.min(3.0, zoomState.scale + 0.1); }
  else if (action === 'out')    { zoomState.mode = 'custom'; zoomState.scale = Math.max(0.25, zoomState.scale - 0.1); }
  else if (action === 'width')  { zoomState.mode = 'width';  zoomState.scale = w / PAGE_W; }
  else if (action === 'height') { zoomState.mode = 'height'; zoomState.scale = (h - 80) / PAGE_H; }

  applyZoom();
}

function applyZoom() {
  document.getElementById('zoomWrapper').style.transform =
    `scale(${zoomState.scale})`;
  document.getElementById('zoomLabel').textContent =
    Math.round(zoomState.scale * 100) + '%';
}

window.addEventListener('resize', () => {
  if (zoomState.mode === 'width' || zoomState.mode === 'height') setZoom(zoomState.mode);
  updateToolbarMode();
});
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    if (zoomState.mode === 'width' || zoomState.mode === 'height') setZoom(zoomState.mode);
  });
}

/* ===== 툴바 ===== */
function getMenuNaturalWidth() {
  const toolbarMenu = document.getElementById('toolbarMenu');
  const items       = Array.from(toolbarMenu.children);
  let total = 0;
  items.forEach(el => {
    const style = window.getComputedStyle(el);
    total += el.offsetWidth
           + parseFloat(style.marginLeft  || 0)
           + parseFloat(style.marginRight || 0);
  });
  const gap = parseFloat(
    window.getComputedStyle(toolbarMenu).columnGap ||
    window.getComputedStyle(toolbarMenu).gap || 0
  );
  if (items.length > 1) total += gap * (items.length - 1);
  return total;
}

function updateToolbarMode() {
  const toolbar     = document.getElementById('toolbar');
  const toolbarMenu = document.getElementById('toolbarMenu');
  const left        = toolbar.querySelector('.toolbar-left');
  toolbar.classList.remove('compact');
  toolbarMenu.classList.remove('open');
  const availableWidth = toolbar.clientWidth - 24;
  const neededWidth    = left.offsetWidth + getMenuNaturalWidth() + 24;
  if (neededWidth > availableWidth) toolbar.classList.add('compact');
}

function toggleMenu() {
  const toolbar = document.getElementById('toolbar');
  if (!toolbar.classList.contains('compact')) return;
  document.getElementById('toolbarMenu').classList.toggle('open');
}

function closeMenuOnCompact() {
  const toolbar = document.getElementById('toolbar');
  if (toolbar.classList.contains('compact')) {
    document.getElementById('toolbarMenu').classList.remove('open');
  }
}

/* ===== 액션 ===== */
function newDocument() {
  if (confirm('모든 내용이 지워집니다. 새로 시작할까요?')) {
    state.chars = [];
    state.cursorPos = 0;
    state.selectionStart = 0;
    state.selectionEnd = 0;
    state.composing = false;
    render();
    saveToURL();
    syncInputFromState();
    focusInput();
    closeMenuOnCompact();
  }
}

function changeFont(v) {
  state.font = v;
  document.documentElement.style.setProperty('--font-family', v);
  render();
  saveToURL();
}

function changeColor(btn) {
  document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.color = btn.dataset.color;
  document.documentElement.style.setProperty('--grid-color', state.color);
  saveToURL();
}

function doPrint() {
  closeMenuOnCompact();
  setTimeout(() => window.print(), 100);
}

function copyURL() {
  navigator.clipboard.writeText(location.href).then(() => {
    showToast('현재 문서 주소가 복사되었습니다.');
  });
  closeMenuOnCompact();
}

function copyText() {
  const text = hasSelection() ? getSelectedText() : state.chars.join('');
  navigator.clipboard.writeText(text).then(() => {
    showToast(hasSelection() ? '선택한 텍스트가 복사되었습니다.' : '텍스트가 복사되었습니다.');
  });
  closeMenuOnCompact();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

/* ===== 초기화 ===== */
document.addEventListener('DOMContentLoaded', () => {
  loadFromURL();
  applySettings();
  render();
  syncInputFromState();

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      initMobileZoom();
      updateToolbarMode();
    });
  });
});
</script>
