<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>원고지 쓰기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Nanum+Myeongjo:wght@400;700&family=Nanum+Gothic:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --grid-color: #c0392b;
  --cell-size: 35px;
  --font-size: 22px;
  --font-family: 'Noto Serif KR', serif;
  --toolbar-height: 56px;
}

html, body {
  width: 100%;
  height: 100%;
  background: #e8e4df;
  font-family: var(--font-family);
  overflow: hidden;
  touch-action: manipulation; 
}

/* ===== TOOLBAR ===== */
.toolbar {
  position: fixed; top: 0; left: 0; right: 0; min-height: var(--toolbar-height);
  background: #2c2c2c; color: #fff; z-index: 1000; display: flex; align-items: center;
  padding: 8px 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); font-family: 'Noto Sans KR', sans-serif;
}
.toolbar-mobile-left { display: none; }
.toolbar-title { font-size: 16px; font-weight: 700; color: #fff; white-space: nowrap; margin-right: 16px; flex-shrink: 0; }
.toolbar-menu { flex: 1; display: flex; align-items: center; min-width: 0; }
.toolbar-group { display: flex; align-items: center; gap: 8px; }
.document-group { flex-wrap: nowrap; }
.zoom-group { position: absolute; left: 50%; transform: translateX(-50%); }
.action-group { margin-left: auto; }
.menu-toggle { width: 42px; min-width: 42px; height: 40px; padding: 0 !important; font-size: 18px; line-height: 1; justify-content: center; align-items: center; flex: 0 0 42px; background: #444; color: #fff; border: 1px solid #555; border-radius: 8px; cursor: pointer; }
.toolbar button, .toolbar select { background: #444; color: #fff; border: 1px solid #555; border-radius: 8px; padding: 8px 11px; font-size: 13px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; white-space: nowrap; display: inline-flex; align-items: center; justify-content: center; line-height: 1; }
.toolbar button:hover, .toolbar select:hover { background: #555; }
.toolbar select { min-width: 150px; text-align: center; text-align-last: center; appearance: auto; }

/* ===== 아이콘 버튼 ===== */
.icon-btn { background: transparent !important; border: none !important; color: #fff; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; padding: 6px !important; border-radius: 6px !important; transition: background 0.2s; }
.icon-btn:hover:not(:disabled) { background: rgba(255,255,255,0.15) !important; }
.icon-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.icon-btn svg { width: 20px; height: 20px; stroke: currentColor; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.desktop-undo-redo { display: flex; align-items: center; gap: 4px; }
.mobile-undo-redo { display: flex; align-items: center; gap: 4px; }
.btn-primary { background: #2980b9 !important; border-color: #3498db !important; font-weight: 700; }
.btn-primary:hover { background: #3498db !important; }

.color-set { display: flex; align-items: center; gap: 8px; background: #3a3a3a; border: 1px solid #555; border-radius: 10px; padding: 6px 8px; flex: 0 0 auto; }
.color-btn { width: 28px !important; height: 28px !important; min-width: 28px !important; min-height: 28px !important; border-radius: 50% !important; padding: 0 !important; border: 2px solid #777 !important; flex: 0 0 28px !important; aspect-ratio: 1 / 1; box-sizing: border-box; }
.color-btn.active { border-color: #fff !important; box-shadow: 0 0 0 2px rgba(255,255,255,0.18); }
.color-red { background: #c0392b !important; } .color-darkgray { background: #555555 !important; } .color-black { background: #222222 !important; }

.zoom-control { display: inline-flex; align-items: center; background: #444; border-radius: 8px; border: 1px solid #555; overflow: hidden; flex: 0 0 auto; }
.zoom-control button { border: none !important; border-radius: 0 !important; background: transparent !important; padding: 8px 10px; min-width: 34px; }
.zoom-control button:hover { background: #555 !important; }
.zoom-label { font-size: 12px; min-width: 48px; text-align: center; padding: 0 6px; pointer-events: none; color: #f0f0f0; }

/* ===== COMPACT MODE (Mobile) ===== */
.toolbar.compact { justify-content: flex-start; padding: 8px 12px; position: relative; }
.toolbar.compact .toolbar-mobile-left { display: flex; align-items: center; gap: 8px; }
.toolbar.compact .toolbar-title { position: absolute; left: 50%; transform: translateX(-50%); margin-right: 0; }
.toolbar.compact .desktop-undo-redo { display: none; }
.toolbar.compact .toolbar-menu { display: none; position: absolute; top: calc(var(--toolbar-height) + 6px); left: 12px; right: auto; width: min(360px, calc(100vw - 24px)); background: #2c2c2c; padding: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.32); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; flex-direction: column; align-items: stretch; gap: 12px; max-height: calc(100vh - var(--toolbar-height) - 16px); overflow-y: auto; }
.toolbar.compact .toolbar-menu.open { display: flex; }
.toolbar.compact .zoom-group { position: static; transform: none; justify-content: center; }
.toolbar.compact .action-group { margin-left: 0; }
.toolbar.compact .toolbar-group { width: 100%; display: grid; grid-template-columns: 1fr; gap: 8px; }
.toolbar.compact button:not(.icon-btn), .toolbar.compact select { width: 100%; min-height: 42px; font-size: 14px; justify-content: center; }
.toolbar.compact .color-set { width: 100%; justify-content: center; padding: 8px 10px; }
.toolbar.compact .zoom-control { width: 100%; justify-content: stretch; }
.toolbar.compact .zoom-control button { flex: 1 1 0; }
.toolbar.compact .zoom-label { flex: 0 0 64px; display: flex; align-items: center; justify-content: center; }

@media (max-width: 640px) {
  .toolbar.compact .toolbar-menu { left: 0; right: 0; top: calc(var(--toolbar-height) - 2px); width: auto; border-radius: 0 0 14px 14px; border-left: none; border-right: none; }
}

/* ===== PAGE AREA ===== */
.page-container { 
  position: fixed; top: var(--toolbar-height); left: 0; right: 0; bottom: 0; 
  padding: 28px 0 60px; 
  display: block; /* 플렉스 중앙정렬 해제(가로 스크롤 확보를 위해) */
  overflow: auto; /* hidden이었던 부분을 auto로 변경하여 상하좌우 스크롤 허용 */
  -webkit-overflow-scrolling: touch; 
}
.zoom-wrapper { 
  display: flex; flex-direction: column; gap: 40px; 
  transform-origin: top left; /* 확대 기준점을 상단 중앙에서 좌측 상단으로 변경 */
  transition: transform 0.1s ease-out; /* 모바일 핀치 줌을 위해 속도를 0.1s로 단축 */
  width: fit-content; /* 내부 콘텐츠 크기에 맞춤 */
}
.page { background: #fff; box-shadow: 0 4px 20px rgba(0,0,0,0.15); position: relative; width: 794px; height: 1123px; padding: 60px 47px; flex-shrink: 0; }
.page-header { display: flex; justify-content: flex-end; align-items: baseline; padding: 0 4px 10px 0; font-family: 'Noto Serif KR', serif; color: #333; font-size: 14px; gap: 6px; }
.page-header .page-no-label { font-size: 12px; color: #555; letter-spacing: 1px; }
.page-header .page-no { font-size: 24px; font-weight: 700; color: #333; }

/* ===== GRID ===== */
.grid-wrapper { display: flex; flex-direction: column; gap: 8px; width: fit-content; margin: 0 auto; }
.grid-row { display: flex; border: 2px solid var(--grid-color); position: relative; }
.grid-cell { width: var(--cell-size); height: var(--cell-size); flex: 0 0 var(--cell-size); border-right: 1px solid var(--grid-color); box-sizing: border-box; display: flex; align-items: center; justify-content: center; font-size: var(--font-size); font-family: var(--font-family); cursor: text; position: relative; line-height: 1; color: #111; user-select: none; -webkit-user-select: none; touch-action: manipulation; }
.grid-row .grid-cell:last-child { border-right: none; }

/* 글자 렌더링 컨테이너 (포인터 이벤트 방지하여 클릭이 셀에 직접 전달되게 함) */
.cell-char { pointer-events: none; }
.grid-cell.two-chars .cell-char { font-size: 19px; letter-spacing: 1px; }

/* 복합 문장부호 (마침표 + 따옴표 등) 위치 정렬 */
.punct-combo { position: relative; width: 100%; height: 100%; display: block; pointer-events: none; }
.punct-combo .p1 { position: absolute; left: 6px; bottom: 4px; line-height: 1; }
.punct-combo .p2 { position: absolute; right: 6px; top: 4px; line-height: 1; }

.overflow-cell { position: absolute; right: calc(var(--cell-size) * -1); top: 0; width: var(--cell-size); height: var(--cell-size); display: flex; align-items: center; justify-content: center; font-size: var(--font-size); color: #111; pointer-events: none; line-height: 1; }/* 여백에 찍히는 마침표/쉼표도 좌측 하단으로 정렬 */
.overflow-cell.punct-left { justify-content: flex-start; align-items: flex-end; padding-left: 6px; padding-bottom: 4px; }

/* 커서 및 선택 영역 상태 스타일 */
.grid-cell.cursor-cell { background: rgba(66,133,244,0.15); }
.grid-cell.cursor-cell::after { content: ''; position: absolute; left: 2px; top: 15%; bottom: 15%; width: 2px; background: #2962ff; animation: blink 1s step-end infinite; }
/* 한 칸에 두 글자가 들어갈 때 커서가 중간에 위치하는 경우 */
.grid-cell.cursor-cell.cursor-middle::after { left: 50%; transform: translateX(-50%); }

.grid-cell.selected-cell { background: rgba(66,133,244,0.12); }
/* 절반만 선택된 상태 (투 글자 조합) */
.grid-cell.selected-left { background: linear-gradient(to right, rgba(66,133,244,0.12) 50%, transparent 50%); }
.grid-cell.selected-right { background: linear-gradient(to right, transparent 50%, rgba(66,133,244,0.12) 50%); }

.grid-cell.selection-focus-cell { box-shadow: inset 0 0 0 2px rgba(41,98,255,0.25); }
.grid-cell.composing-cell { background: rgba(255,193,7,0.2); }
.grid-cell.composing-cell .cell-char { border-bottom: 2px solid #f57c00; padding-bottom: 1px; }

/* 마침표, 쉼표 좌측 하단 정렬 */
.grid-cell.punct-left { justify-content: flex-start; align-items: flex-end; padding-left: 6px; padding-bottom: 4px; }

@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }

/* ===== HIDDEN INPUT ===== */
#hiddenInput { position: fixed; left: -100vw; top: 50%; transform: translateY(-50%); width: 100vw; height: 2.5em; opacity: 0; font-size: 16px; border: none; outline: none; resize: none; z-index: 1; padding: 0.2em; color: transparent; background: transparent; caret-color: transparent; -webkit-appearance: none; appearance: none; }

/* ===== 링크 잘림 경고 배너 ===== */
.truncate-warning {
  display: none;
  position: fixed;
  top: var(--toolbar-height);
  left: 0;
  right: 0;
  background: #e67e22;
  color: #fff;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px;
  text-align: center;
  padding: 10px 16px;
  z-index: 990;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  word-break: keep-all;
  cursor: pointer;
}
.truncate-warning span {
  opacity: 0.8;
  font-size: 11px;
  margin-left: 8px;
  text-decoration: underline;
}
@media print {
  .truncate-warning { display: none !important; }
}
  
/* ===== TOAST ===== */
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.82); color: #fff; padding: 12px 24px; border-radius: 999px; font-size: 14px; opacity: 0; transition: opacity 0.25s; z-index: 9999; font-family: 'Noto Sans KR', sans-serif; pointer-events: none; }
.toast.show { opacity: 1; }

/* ===== PRINT ===== */
@media print {
  @page { size: A4 portrait; margin: 0; }
  html, body { width: auto !important; height: auto !important; overflow: visible !important; background: #fff !important; margin: 0 !important; padding: 0 !important; }
  .toolbar, .toast, #hiddenInput { display: none !important; }
  .page-container { position: static !important; padding: 0 !important; display: block !important; width: auto !important; height: auto !important; overflow: visible !important; }
  .zoom-wrapper { transform: none !important; display: block !important; width: auto !important; height: auto !important; overflow: visible !important; gap: 0 !important; }
  .page { width: 210mm !important; height: 297mm !important; margin: 0 !important; padding: 60px 47px !important; box-shadow: none !important; overflow: hidden !important; page-break-after: always; break-after: page; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .page:last-child { page-break-after: auto; break-after: auto; }
  .page-header { display: flex !important; justify-content: flex-end !important; align-items: baseline !important; gap: 6px !important; width: auto !important; text-align: right !important; padding: 0 4px 10px 0 !important; }
  .page-header .page-no-label, .page-header .page-no { width: auto !important; display: inline !important; flex: none !important; text-align: inherit !important; }
}
</style>
</head>
<body>

<div class="toolbar" id="toolbar">
  <div class="toolbar-mobile-left">
    <button class="menu-toggle" id="menuToggle" onclick="toggleMenu()">☰</button>
    <div class="mobile-undo-redo">
      <button class="icon-btn btn-undo" onclick="undo()" title="되돌리기 (Ctrl+Z)"><svg viewBox="0 0 24 24"><path d="M9 14L4 9l5-5"/><path d="M4 9h11a4 4 0 0 1 0 8h-1"/></svg></button>
      <button class="icon-btn btn-redo" onclick="redo()" title="다시실행 (Ctrl+Y)"><svg viewBox="0 0 24 24"><path d="M15 14l5-5-5-5"/><path d="M20 9H9a4 4 0 0 0 0 8h1"/></svg></button>
    </div>
  </div>

  <div class="toolbar-title">원고지 쓰기</div>

  <div class="toolbar-menu" id="toolbarMenu">
    <div class="toolbar-group document-group">
      <button onclick="newDocument()">📄 새 문서</button>
      <select id="fontSelect" onchange="changeFont(this.value)" title="글꼴">
        <option value="'Noto Serif KR', serif">명조 (Noto Serif)</option>
        <option value="'Nanum Myeongjo', serif">나눔명조</option>
        <option value="'Noto Sans KR', sans-serif">고딕 (Noto Sans)</option>
        <option value="'Nanum Gothic', sans-serif">나눔고딕</option>
      </select>
      <div class="color-set" title="원고지 색깔">
        <button class="color-btn color-red active"  data-color="#c0392b" onclick="changeColor(this)" title="빨강"></button>
        <button class="color-btn color-darkgray"    data-color="#555555" onclick="changeColor(this)" title="회색"></button>
        <button class="color-btn color-black"       data-color="#222222" onclick="changeColor(this)" title="검정"></button>
      </div>
      <div class="desktop-undo-redo">
        <button class="icon-btn btn-undo" onclick="undo()" title="되돌리기 (Ctrl+Z)"><svg viewBox="0 0 24 24"><path d="M9 14L4 9l5-5"/><path d="M4 9h11a4 4 0 0 1 0 8h-1"/></svg></button>
        <button class="icon-btn btn-redo" onclick="redo()" title="다시실행 (Ctrl+Y)"><svg viewBox="0 0 24 24"><path d="M15 14l5-5-5-5"/><path d="M20 9H9a4 4 0 0 0 0 8h1"/></svg></button>
      </div>
    </div>

    <div class="toolbar-group zoom-group">
      <div class="zoom-control">
        <button onclick="setZoom('out')" title="축소">－</button>
        <span class="zoom-label" id="zoomLabel">100%</span>
        <button onclick="setZoom('in')"  title="확대">＋</button>
      </div>
      <button onclick="setZoom('width')">너비맞춤</button>
      <button onclick="setZoom('height')">높이맞춤</button>
    </div>

    <div class="toolbar-group action-group">
      <button class="btn-primary" onclick="doPrint()">🖨️ 인쇄</button>
      <button onclick="copyURL()">🔗 주소 복사</button>
      <button onclick="copyText()">📋 텍스트 복사</button>
    </div>
  </div>
</div>

<div class="truncate-warning" id="truncateWarning" onclick="this.style.display='none'; document.getElementById('pageContainer').style.top='var(--toolbar-height)';">
  글자 수 제한으로 링크가 완전하지 않아 글의 일부만 보여집니다. 원고지의 주소 끝까지 붙여넣기 되도록 해주세요. <span>(닫기 ✕)</span>
</div>  

  
<div class="page-container" id="pageContainer">
  <div class="zoom-wrapper" id="zoomWrapper"></div>
</div>

<textarea id="hiddenInput"
  autocomplete="off" autocorrect="off"
  autocapitalize="off" spellcheck="false"></textarea>

<div class="toast" id="toast"></div>

<script>
/* ===== 모바일 더블 탭 확대 방지 ===== */
let lastTouchEnd = 0;
document.addEventListener('touchend', function(e) {
  const now = (new Date()).getTime();
  if (now - lastTouchEnd <= 300) {
    if (!e.target.closest('button') && !e.target.closest('select')) e.preventDefault();
  }
  lastTouchEnd = now;
}, { passive: false });


const COLS = 20, ROWS = 20;

let state = {
  chars: [], cursorPos: 0, selectionStart: 0, selectionEnd: 0,
  font: "'Noto Serif KR', serif", color: '#c0392b', composing: false
};

let zoomState = { mode: 'width', scale: 1.0 };

const SENTINEL = '\u200B';
const SENTINEL_LEN = SENTINEL.length;

const scroller = document.getElementById('pageContainer');
const input    = document.getElementById('hiddenInput');
const supportsBeforeInput = 'onbeforeinput' in input;

const MANUAL_BEFOREINPUT_TYPES = new Set([
  'deleteContentBackward', 'deleteContentForward', 'deleteWordBackward',
  'deleteWordForward', 'insertParagraph', 'insertLineBreak'
]);

/* ===== Undo / Redo 기능 ===== */
const MAX_HISTORY = 30;
let historyStack = [];
let historyIndex = -1;

function saveHistory(force = false) {
  const currentState = { c: [...state.chars], s: state.selectionStart, e: state.selectionEnd };
  if (!force && historyIndex >= 0) {
    const prev = historyStack[historyIndex];
    if (currentState.c.join('') === prev.c.join('')) return; 
  }
  if (historyIndex < historyStack.length - 1) historyStack = historyStack.slice(0, historyIndex + 1);

  historyStack.push(currentState);
  if (historyStack.length > MAX_HISTORY) historyStack.shift();
  else historyIndex++;
  updateUndoRedoUI();
}

function restoreHistory(idx) {
  if (idx < 0 || idx >= historyStack.length) return;
  const item = historyStack[idx];
  state.chars = [...item.c];
  state.selectionStart = item.s; state.selectionEnd = item.e; state.cursorPos = item.e;
  historyIndex = idx;
  render(); syncInputFromState(); saveToURL(); scrollToCursor(); updateUndoRedoUI(); focusInput();
}

function undo() { if (historyIndex > 0) restoreHistory(historyIndex - 1); }
function redo() { if (historyIndex < historyStack.length - 1) restoreHistory(historyIndex + 1); }

function updateUndoRedoUI() {
  document.querySelectorAll('.btn-undo').forEach(b => b.disabled = historyIndex <= 0);
  document.querySelectorAll('.btn-redo').forEach(b => b.disabled = historyIndex >= historyStack.length - 1);
}

/* ===== 단축키 ===== */
document.addEventListener('keydown', (e) => {
  const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
  const cmdOrCtrl = isMac ? e.metaKey : e.ctrlKey;
  if (cmdOrCtrl && !e.altKey) {
    const key = e.key.toLowerCase();
    if (key === 'z') { e.preventDefault(); if (e.shiftKey) redo(); else undo(); } 
    else if (key === 'y') { e.preventDefault(); redo(); }
  }
});

/* ===== 유틸 ===== */
function clamp(n, min, max) { return Math.max(min, Math.min(max, n)); }
function normalizeText(text) { return String(text ?? '').replace(/\r\n?/g, '\n').replace(/\u200B/g, ''); }
function hasSelection() { return state.selectionStart !== state.selectionEnd; }
function getSelectedText() {
  const s = Math.min(state.selectionStart, state.selectionEnd);
  const e = Math.max(state.selectionStart, state.selectionEnd);
  return state.chars.slice(s, e).join('');
}

function setLogicalSelection(start, end = start, opts = {}) {
  const max = state.chars.length;
  const s = clamp(Math.min(start, end), 0, max);
  const e = clamp(Math.max(start, end), 0, max);
  state.selectionStart = s; state.selectionEnd = e; state.cursorPos = e;

  if (opts.syncInput)  syncInputFromState();
  if (opts.renderView) render();
  if (opts.scroll)     scrollToCursor();
  if (opts.focus)      focusInput();
}

function applyAutoReplace() {
  let text = state.chars.join('');
  if (!text.includes('...')) return false;

  let changed = false;
  let s = state.selectionStart, e = state.selectionEnd;

  while (text.includes('...')) {
    const idx = text.indexOf('...');
    text = text.substring(0, idx) + '…' + text.substring(idx + 3);
    changed = true;
    if (s > idx + 2) s -= 2; else if (s > idx) s = idx + 1;
    if (e > idx + 2) e -= 2; else if (e > idx) e = idx + 1;
  }
  state.chars = text.split('');
  state.selectionStart = s; state.selectionEnd = e; state.cursorPos = e;
  return changed;
}

function replaceRangeInState(start, end, text) {
  const max = state.chars.length;
  const s = clamp(Math.min(start, end), 0, max), e = clamp(Math.max(start, end), 0, max);
  const safe = normalizeText(text);
  state.chars.splice(s, e - s, ...safe.split(''));
  const next = s + safe.length;
  setLogicalSelection(next, next);
  return true;
}

function deleteRangeInState(start, end) {
  const s = Math.min(start, end), e = Math.max(start, end);
  if (s === e) return false;
  state.chars.splice(s, e - s);
  setLogicalSelection(s, s);
  return true;
}

function deleteBackwardInState() {
  if (hasSelection()) return deleteRangeInState(state.selectionStart, state.selectionEnd);
  if (state.cursorPos <= 0) return false;
  state.chars.splice(state.cursorPos - 1, 1);
  setLogicalSelection(state.cursorPos - 1, state.cursorPos - 1);
  return true;
}

function deleteForwardInState() {
  if (hasSelection()) return deleteRangeInState(state.selectionStart, state.selectionEnd);
  if (state.cursorPos >= state.chars.length) return false;
  state.chars.splice(state.cursorPos, 1);
  setLogicalSelection(state.cursorPos, state.cursorPos);
  return true;
}

function deleteWordBackwardInState() {
  if (hasSelection()) return deleteRangeInState(state.selectionStart, state.selectionEnd);
  const text = state.chars.join('');
  let i = state.cursorPos;
  if (i <= 0) return false;
  while (i > 0 && /\s/.test(text[i - 1])) i--;
  while (i > 0 && !/\s/.test(text[i - 1])) i--;
  return deleteRangeInState(i, state.cursorPos);
}

function deleteWordForwardInState() {
  if (hasSelection()) return deleteRangeInState(state.selectionStart, state.selectionEnd);
  const text = state.chars.join('');
  let i = state.cursorPos;
  if (i >= text.length) return false;
  while (i < text.length && /\s/.test(text[i])) i++;
  while (i < text.length && !/\s/.test(text[i])) i++;
  return deleteRangeInState(state.cursorPos, i);
}

function afterStateEdit(save = true) {
  applyAutoReplace(); render(); syncInputFromState();
  if (save) { saveToURL(); saveHistory(); }
  scrollToCursor();
}

/* ===== hidden textarea 동기화 ===== */
function ensureSentinel() {
  if (input.value.startsWith(SENTINEL)) return;
  const start = input.selectionStart ?? 0, end = input.selectionEnd ?? start;
  input.value = SENTINEL + input.value.split(SENTINEL).join('');
  try {
    input.setSelectionRange(Math.max(SENTINEL_LEN, start + SENTINEL_LEN), Math.max(SENTINEL_LEN, end + SENTINEL_LEN));
  } catch (e) {}
}

function clampNativeSelection() {
  const valueLen = input.value.length;
  let start = input.selectionStart ?? SENTINEL_LEN, end = input.selectionEnd ?? start;
  start = clamp(start, SENTINEL_LEN, valueLen); end = clamp(end, SENTINEL_LEN, valueLen);
  if (start > end) [start, end] = [end, start];
  if (input.selectionStart !== start || input.selectionEnd !== end) {
    try { input.setSelectionRange(start, end); } catch (e) {}
  }
  return { start, end };
}

function syncInputFromState() {
  const text = state.chars.join('');
  const nextValue = SENTINEL + text;
  if (input.value !== nextValue) input.value = nextValue;
  const s = SENTINEL_LEN + clamp(state.selectionStart, 0, state.chars.length);
  const e = SENTINEL_LEN + clamp(state.selectionEnd,   0, state.chars.length);
  try { input.setSelectionRange(s, e); } catch (e) {}
}

function syncStateFromInput() {
  ensureSentinel();
  const text = normalizeText(input.value.slice(SENTINEL_LEN));
  state.chars = text.split('');
  const { start, end } = clampNativeSelection();
  setLogicalSelection(start - SENTINEL_LEN, end - SENTINEL_LEN);
  if (!state.composing && applyAutoReplace()) syncInputFromState();
}

function syncFromNativeInput(save = true) {
  syncStateFromInput(); render();
  if (save) { saveToURL(); saveHistory(); }
  scrollToCursor();
}

/* ===== LZ ===== */
const LZ = {
  compress(str) {
    if (!str) return '';
    try {
      const bytes = new TextEncoder().encode(str);
      let bin = ''; bytes.forEach(b => bin += String.fromCharCode(b));
      return btoa(bin).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
    } catch(e) { return ''; }
  },
  decompress(b64) {
    if (!b64) return '';
    try {
      b64 = b64.replace(/-/g,'+').replace(/_/g,'/');
      
      // Base64 유효성 보정: 문자열 길이가 4의 배수 기준 1개 남으면 atob에서 무조건 에러가 발생하므로 마지막 글자를 버림
      if (b64.replace(/=/g, '').length % 4 === 1) {
        b64 = b64.slice(0, -1);
      }
      
      while (b64.length % 4) b64 += '=';
      const bin = atob(b64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      
      // fatal: false 설정으로 깨진 유니코드 문자열이 있어도 에러 없이 살릴 수 있는 데까지 복구함
      return new TextDecoder('utf-8', { fatal: false }).decode(bytes);
    } catch(e) { return ''; }
  }
};

/* ===== URL 저장 / 불러오기 ===== */
function saveToURL() {
  const hash = LZ.compress(JSON.stringify({ t: state.chars.join(''), f: state.font, c: state.color }));
  history.replaceState(null, '', '#' + hash);
}

function loadFromURL() {
  const hash = location.hash.slice(1);
  if (!hash) return;
  try {
    const decompressed = LZ.decompress(hash);
    let data = {};
    let isRecovered = false; // 복구 여부 체크 플래그
    
    try {
      // 1차 시도: 정상적인 JSON 파싱
      data = JSON.parse(decompressed);
    } catch(e) {
      // 2차 시도: 링크가 잘려서 파싱에 실패한 경우 강제 복구
      const tIndex = decompressed.indexOf('"t":"');
      if (tIndex !== -1) {
        let textPart = decompressed.slice(tIndex + 5);
        
        textPart = textPart.replace(/["}\],]+$/, ''); 
        textPart = textPart.replace(/\\$/, ''); 
        data.t = textPart.replace(/\\n/g, '\n').replace(/\\"/g, '"').replace(/\\\\/g, '\\');
        
        isRecovered = true; // 텍스트가 강제 복구되었음을 표시
      }
    }

    state.chars = data.t ? data.t.split('') : [];
    state.font  = data.f || state.font; 
    state.color = data.c || state.color;
    state.cursorPos = 0; state.selectionStart = 0; state.selectionEnd = 0;
    
    applySettings();

    // 텍스트가 잘린 상태로 복구된 경우 경고창 띄우기
    if (isRecovered) {
      const warningEl = document.getElementById('truncateWarning');
      if (warningEl) {
        warningEl.style.display = 'block';
        // 배너가 화면을 가리지 않게 원고지 컨테이너의 시작 위치를 배너 높이만큼 내림
        document.getElementById('pageContainer').style.top = `calc(var(--toolbar-height) + ${warningEl.offsetHeight}px)`;
      }
    }

  } catch(e) {
    console.error('URL 복구 실패:', e);
  }
}

function applySettings() {
  document.documentElement.style.setProperty('--font-family', state.font);
  document.documentElement.style.setProperty('--grid-color',  state.color);
  document.getElementById('fontSelect').value = state.font;
  document.querySelectorAll('.color-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.color === state.color);
  });
}

/* ===== 레이아웃 로직 고도화 (글자 그룹핑 적용) ===== */
function buildLayout() {
  const displayChars = state.chars.slice();
  const pages = [];
  let page = { rows: [] };
  let row  = { cells: [], overflow: null, isNewlineEnded: false, newlineLogicalIdx: -1 };

  for (let i = 0; i < displayChars.length; i++) {
    const ch = displayChars[i];
    if (ch === '\n') {
      row.isNewlineEnded = true; row.newlineLogicalIdx = i;
      page.rows.push(row);
      if (page.rows.length === ROWS) { pages.push(page); page = { rows: [] }; }
      row = { cells: [], overflow: null, isNewlineEnded: false, newlineLogicalIdx: -1 };
      continue;
    }

    let cellStr = ch;
    let charsInCell = 1;
    let isPunctCombo = false;
    const nextCh = displayChars[i + 1];

    // 1. 규칙: 마침표/쉼표 바로 뒤에 따옴표가 오면 한 칸으로 병합
    if ((ch === '.' || ch === ',') && nextCh && /['"”’]/.test(nextCh)) {
      cellStr += nextCh;
      charsInCell = 2;
      isPunctCombo = true;
    } 
    // 2. 규칙: 소문자나 숫자가 연속해서 2개 오면 한 칸으로 병합
    else if (/[a-z0-9]/.test(ch) && nextCh && /[a-z0-9]/.test(nextCh)) {
      cellStr += nextCh;
      charsInCell = 2;
    }

    row.cells.push({
      char: cellStr, logicalIdx: i, length: charsInCell,
      isPunctCombo: isPunctCombo, empty: false
    });

    i += (charsInCell - 1); // 병합된 글자는 루프 인덱스 스킵

    // 오버플로우(여백) 로직
    if (row.cells.length === COLS) {
      const nextIdx = i + 1;
      const lookahead = displayChars[nextIdx];
      
      // 줄 마지막 칸을 넘어가는 문장부호 처리
      if (lookahead && lookahead !== '\n' && /^[.,?!'"”’ ]$/.test(lookahead)) {
        let overflowStr = lookahead;
        let overflowLen = 1;
        let overflowCombo = false;
        const nextLookahead = displayChars[nextIdx + 1];

        if ((lookahead === '.' || lookahead === ',') && nextLookahead && /['"”’]/.test(nextLookahead)) {
          overflowStr += nextLookahead;
          overflowLen = 2;
          overflowCombo = true;
        }

        row.overflow = {
          char: overflowStr, logicalIdx: nextIdx, length: overflowLen,
          isPunctCombo: overflowCombo
        };
        i += overflowLen;
      }
      
      page.rows.push(row);
      if (page.rows.length === ROWS) { pages.push(page); page = { rows: [] }; }
      row = { cells: [], overflow: null, isNewlineEnded: false, newlineLogicalIdx: -1 };
    }
  }

  // 남은 셀 처리
  if (row.cells.length > 0 || displayChars[displayChars.length - 1] === '\n' || displayChars.length === 0) page.rows.push(row);
  if (page.rows.length > 0) pages.push(page);
  if (pages.length === 0) pages.push({ rows: [{ cells: [], overflow: null, isNewlineEnded: false, newlineLogicalIdx: -1 }] });

  // 빈 칸(Empty cells) 채워넣기
  let lastLogical = 0;
  for (let pIdx = 0; pIdx < pages.length; pIdx++) {
    const p = pages[pIdx];
    while (p.rows.length < ROWS) p.rows.push({ cells: [], overflow: null, isNewlineEnded: false, newlineLogicalIdx: -1 });
    for (let rIdx = 0; rIdx < ROWS; rIdx++) {
      const r = p.rows[rIdx];
      for (let cIdx = 0; cIdx < COLS; cIdx++) {
        if (r.cells[cIdx]) {
          lastLogical = r.cells[cIdx].logicalIdx + r.cells[cIdx].length;
        } else {
          r.cells[cIdx] = {
            char: '', logicalIdx: (r.isNewlineEnded && !r.overflow) ? r.newlineLogicalIdx : lastLogical,
            length: 1, empty: true
          };
        }
      }
      if (r.overflow) lastLogical = r.overflow.logicalIdx + r.overflow.length;
      if (r.isNewlineEnded) lastLogical = r.newlineLogicalIdx + 1;
    }
  }

  return { pages };
}

/* ===== 렌더 ===== */
function render() {
  const layout = buildLayout();
  const wrapper = document.getElementById('zoomWrapper');
  const selectionActive = hasSelection();

  while (wrapper.children.length < layout.pages.length) wrapper.appendChild(createPage(wrapper.children.length));
  while (wrapper.children.length > layout.pages.length) wrapper.removeChild(wrapper.lastChild);

  let foundCursor = false;

  for (let pIdx = 0; pIdx < layout.pages.length; pIdx++) {
    const pageData = layout.pages[pIdx];
    const pageEl   = wrapper.children[pIdx];
    pageEl.querySelector('.page-no').textContent = pIdx + 1;
    const gridRows = pageEl.querySelectorAll('.grid-row');

    for (let rIdx = 0; rIdx < ROWS; rIdx++) {
      const rowData = pageData.rows[rIdx];
      const rowEl   = gridRows[rIdx];
      const cells   = rowEl.querySelectorAll('.grid-cell');

      for (let cIdx = 0; cIdx < COLS; cIdx++) {
        const cellData = rowData.cells[cIdx];
        const cellEl   = cells[cIdx];
        
        // 1. 글자/부호 DOM 주입
        if (cellData.isPunctCombo) {
          cellEl.innerHTML = `<span class="punct-combo"><span class="p1">${cellData.char[0]}</span><span class="p2">${cellData.char[1]}</span></span>`;
        } else {
          cellEl.innerHTML = `<span class="cell-char">${cellData.char}</span>`;
        }
        cellEl.dataset.logicalIdx = cellData.logicalIdx;

        // 2. 커서 위치 판별 (글자 사이 절반 커서 포함)
        let isCursor = false;
        let isCursorMiddle = false;
        if (!selectionActive && !foundCursor) {
          if (state.cursorPos === cellData.logicalIdx) {
            isCursor = true; foundCursor = true;
          } else if (cellData.length === 2 && state.cursorPos === cellData.logicalIdx + 1) {
            isCursor = true; isCursorMiddle = true; foundCursor = true;
          } else if (cellData.empty && cellData.logicalIdx >= state.cursorPos) {
            isCursor = true; foundCursor = true;
          }
        }

        // 3. 선택 영역 판별 (절반 선택 포함)
        let isSelected = false;
        let isSelectedLeft = false;
        let isSelectedRight = false;
        let isSelectionFocus = false;

        if (selectionActive && !cellData.empty) {
          const s1 = cellData.logicalIdx >= state.selectionStart && cellData.logicalIdx < state.selectionEnd;
          const s2 = cellData.length === 2 && (cellData.logicalIdx + 1) >= state.selectionStart && (cellData.logicalIdx + 1) < state.selectionEnd;

          if (cellData.length === 1) { if (s1) isSelected = true; } 
          else {
            if (s1 && s2) isSelected = true;
            else if (s1) isSelectedLeft = true;
            else if (s2) isSelectedRight = true;
          }

          if (state.selectionEnd - 1 === cellData.logicalIdx) isSelectionFocus = true;
          if (cellData.length === 2 && state.selectionEnd - 1 === cellData.logicalIdx + 1) isSelectionFocus = true;
        }

        const isComposingChar = state.composing && state.cursorPos > 0 && !cellData.empty &&
          ((cellData.logicalIdx === state.cursorPos - 1) || (cellData.length === 2 && cellData.logicalIdx + 1 === state.cursorPos - 1));

        // 4. 클래스 종합 적용
        cellEl.className = 'grid-cell';
        if (cellData.length === 2 && !cellData.isPunctCombo) cellEl.classList.add('two-chars');
        
        if (isCursor && !state.composing && !selectionActive) {
          cellEl.classList.add('cursor-cell');
          if (isCursorMiddle) cellEl.classList.add('cursor-middle');
        }
        
        if (isSelected) cellEl.classList.add('selected-cell');
        else if (isSelectedLeft) cellEl.classList.add('selected-left');
        else if (isSelectedRight) cellEl.classList.add('selected-right');
        
        if (isSelectionFocus) cellEl.classList.add('selection-focus-cell');
        if (isComposingChar) cellEl.classList.add('composing-cell');
        if (!cellData.isPunctCombo && (cellData.char === '.' || cellData.char === ',')) cellEl.classList.add('punct-left');
      }

      // 5. 오버플로우 (여백 부호)
      let overflowEl = rowEl.querySelector('.overflow-cell');
      if (rowData.overflow) {
        if (!overflowEl) { overflowEl = document.createElement('div'); overflowEl.className = 'overflow-cell'; rowEl.appendChild(overflowEl); }
        
        if (rowData.overflow.isPunctCombo) {
          overflowEl.innerHTML = `<span class="punct-combo"><span class="p1">${rowData.overflow.char[0]}</span><span class="p2">${rowData.overflow.char[1]}</span></span>`;
          overflowEl.classList.remove('punct-left');
        } else {
          overflowEl.innerHTML = `<span class="cell-char">${rowData.overflow.char}</span>`;
          if (rowData.overflow.char === '.' || rowData.overflow.char === ',') {
            overflowEl.classList.add('punct-left');
          } else {
            overflowEl.classList.remove('punct-left');
          }
        }
      } else if (overflowEl) overflowEl.remove();
    }
  }
  // 👇 렌더링이 끝난 후 바뀐 페이지 높이에 맞춰 줌 여백을 다시 계산하도록 아래 한 줄 추가
  applyZoom();
}

function createPage(idx) {
  const page = document.createElement('div'); page.className = 'page';
  let html = `<div class="page-header"><span class="page-no-label">NO.</span><span class="page-no">${idx + 1}</span></div><div class="grid-wrapper">`;
  for (let r = 0; r < ROWS; r++) {
    html += `<div class="grid-row">`;
    for (let c = 0; c < COLS; c++) html += `<div class="grid-cell"></div>`;
    html += `</div>`;
  }
  html += `</div>`;
  page.innerHTML = html;
  return page;
}

/* ===== 포커스 및 터치 처리 (절반 터치 좌표 계산) ===== */
function focusInput() { input.focus({ preventScroll: true }); }

let touchStartX = 0, touchStartY = 0;

document.addEventListener('touchstart', (e) => {
  if (e.target.closest('.toolbar')) return;
  touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY;
  // focusInput(); // <-- 삭제: 여기서 포커스를 주면 모바일에서 키보드가 곧바로 사라지는 원인이 됩니다.
}, { passive: true });

document.addEventListener('touchend', (e) => {
  if (e.target.closest('.toolbar')) return;
  const t = e.changedTouches[0];
  const dist = Math.hypot(t.clientX - touchStartX, t.clientY - touchStartY);

  if (dist < 12) {
    // 탭으로 판정된 경우 브라우저 기본 클릭 동작을 막아 포커스 해제(blur)를 방지합니다.
    if (e.cancelable) e.preventDefault();

    const cell = document.elementFromPoint(t.clientX, t.clientY)?.closest('.grid-cell');
    if (cell) {
      let idx = parseInt(cell.dataset.logicalIdx, 10);
      if (!isNaN(idx)) {
        // 셀의 우측 절반을 터치했으면 커서를 글자 사이로 이동
        const rect = cell.getBoundingClientRect();
        if (cell.classList.contains('two-chars') && (t.clientX - rect.left) > (rect.width / 2)) {
          idx += 1;
        }
        state.composing = false;
        setLogicalSelection(idx, idx, { renderView: true, syncInput: true });
      }
    }
    // 위치 계산이 모두 끝난 후 포커스를 줍니다.
    focusInput();
  }
}, { passive: false });

document.addEventListener('pointerdown', (e) => {
  if (e.pointerType !== 'mouse' || e.target.closest('.toolbar')) return;
  const cell = e.target.closest('.grid-cell');
  if (cell) {
    e.preventDefault();
    let idx = parseInt(cell.dataset.logicalIdx, 10);
    if (!isNaN(idx)) { 
      const rect = cell.getBoundingClientRect();
      if (cell.classList.contains('two-chars') && (e.clientX - rect.left) > (rect.width / 2)) {
        idx += 1;
      }
      state.composing = false; 
      setLogicalSelection(idx, idx, { renderView: true, syncInput: true }); 
    }
  } else if (!e.target.closest('.page-container')) return;
  focusInput();
});

document.addEventListener('click', (e) => {
  const toolbar = document.getElementById('toolbar');
  const menu    = document.getElementById('toolbarMenu');
  if (toolbar.classList.contains('compact') && menu.classList.contains('open')) {
    if (!e.target.closest('#toolbarMenu') && !e.target.closest('#menuToggle')) menu.classList.remove('open');
  }
});

/* ===== IME / 입력 / 이벤트 ===== */
let selectionSyncRAF = 0;
function scheduleSelectionSync(scroll = false) {
  if (selectionSyncRAF) cancelAnimationFrame(selectionSyncRAF);
  selectionSyncRAF = requestAnimationFrame(() => {
    selectionSyncRAF = 0;
    if (document.activeElement !== input) return;
    syncStateFromInput(); render(); if (scroll) scrollToCursor();
  });
}

input.addEventListener('focus', () => { ensureSentinel(); syncInputFromState(); });
input.addEventListener('blur', () => { state.composing = false; render(); });
input.addEventListener('select', () => { scheduleSelectionSync(false); });
document.addEventListener('selectionchange', () => { if (document.activeElement === input) scheduleSelectionSync(false); });

input.addEventListener('beforeinput', (e) => {
  if (!MANUAL_BEFOREINPUT_TYPES.has(e.inputType)) return;
  syncStateFromInput();
  if (state.composing || e.isComposing || !e.cancelable) return;

  let changed = false;
  switch (e.inputType) {
    case 'deleteContentBackward': e.preventDefault(); changed = deleteBackwardInState(); break;
    case 'deleteContentForward':  e.preventDefault(); changed = deleteForwardInState(); break;
    case 'deleteWordBackward':    e.preventDefault(); changed = deleteWordBackwardInState(); break;
    case 'deleteWordForward':     e.preventDefault(); changed = deleteWordForwardInState(); break;
    case 'insertParagraph':
    case 'insertLineBreak':       e.preventDefault(); changed = replaceRangeInState(state.selectionStart, state.selectionEnd, '\n'); break;
  }
  if (changed) afterStateEdit(true); else { render(); syncInputFromState(); }
});

input.addEventListener('paste', (e) => {
  if (state.composing) return;
  const pasted = e.clipboardData?.getData('text/plain');
  if (typeof pasted !== 'string' || pasted.length === 0) return;
  e.preventDefault(); syncStateFromInput(); replaceRangeInState(state.selectionStart, state.selectionEnd, pasted); afterStateEdit(true);
});

input.addEventListener('cut', () => requestAnimationFrame(() => syncFromNativeInput(true)));
input.addEventListener('compositionstart', () => { state.composing = true; requestAnimationFrame(() => { syncStateFromInput(); render(); scrollToCursor(); }); });
input.addEventListener('compositionupdate', () => { requestAnimationFrame(() => { syncStateFromInput(); render(); scrollToCursor(); }); });
input.addEventListener('compositionend', () => { state.composing = false; requestAnimationFrame(() => syncFromNativeInput(true)); });
input.addEventListener('input', () => syncFromNativeInput(!state.composing));

input.addEventListener('keydown', (e) => {
  const lowerKey = e.key.toLowerCase();
  const navKeys = new Set(['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Home', 'End', 'PageUp', 'PageDown']);
  const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
  const cmdOrCtrl = isMac ? e.metaKey : e.ctrlKey;

  if (cmdOrCtrl && !e.altKey && lowerKey === 'a') {
    e.preventDefault(); setLogicalSelection(0, state.chars.length, { renderView: true, syncInput: true, scroll: true }); return;
  }
  if (cmdOrCtrl && !e.altKey && (lowerKey === 'z' || lowerKey === 'y')) { e.preventDefault(); return; }

  if (navKeys.has(e.key)) requestAnimationFrame(() => { syncStateFromInput(); render(); scrollToCursor(); });

  if (supportsBeforeInput || state.composing) return;

  let changed = false;
  if (e.key === 'Backspace') { e.preventDefault(); syncStateFromInput(); changed = deleteBackwardInState(); } 
  else if (e.key === 'Delete') { e.preventDefault(); syncStateFromInput(); changed = deleteForwardInState(); } 
  else if (e.key === 'Enter') { e.preventDefault(); syncStateFromInput(); changed = replaceRangeInState(state.selectionStart, state.selectionEnd, '\n'); }

  if (changed) afterStateEdit(true);
});

input.addEventListener('keyup', (e) => {
  const keys = new Set(['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Home', 'End', 'PageUp', 'PageDown', 'Shift']);
  if (keys.has(e.key)) scheduleSelectionSync(true);
});

function scrollToCursor() {
  requestAnimationFrame(() => {
    let el = document.querySelector('.cursor-cell, .composing-cell, .selection-focus-cell');
    if (!el) { const selected = document.querySelectorAll('.selected-cell'); if (selected.length) el = selected[selected.length - 1]; }
    if (!el) return;

    const containerRect = scroller.getBoundingClientRect();
    const rect = el.getBoundingClientRect();
    const topLimit = containerRect.top + 90, bottomLimit = containerRect.bottom - 70;

    if (rect.top < topLimit) scroller.scrollBy({ top: rect.top - topLimit, behavior: 'smooth' });
    else if (rect.bottom > bottomLimit) scroller.scrollBy({ top: rect.bottom - bottomLimit, behavior: 'smooth' });
  });
}

/* ===== ZOOM ===== */
function getVP() {
  const vp = window.visualViewport;
  return { w: Math.round(vp ? vp.width : window.innerWidth), h: Math.round(vp ? vp.height : window.innerHeight) };
}

function initMobileZoom() {
  const { w, h } = getVP();
  if (w <= h) setZoom('width');
  else { zoomState = { mode: 'custom', scale: Math.min(2.0, Math.max(0.25, (w * 0.6) / 794)) }; applyZoom(); }
}

function setZoom(action) {
  const { w, h } = getVP();
  const PAGE_W = 794 + 80, PAGE_H = 1123 + 120;

  if      (action === 'in')     { zoomState.mode = 'custom'; zoomState.scale = Math.min(3.0, zoomState.scale + 0.1); }
  else if (action === 'out')    { zoomState.mode = 'custom'; zoomState.scale = Math.max(0.25, zoomState.scale - 0.1); }
  else if (action === 'width')  { zoomState.mode = 'width';  zoomState.scale = w / PAGE_W; }
  else if (action === 'height') { zoomState.mode = 'height'; zoomState.scale = (h - 80) / PAGE_H; }
  applyZoom();
}

function applyZoom() {
  const wrapper = document.getElementById('zoomWrapper');
  wrapper.style.transform = `scale(${zoomState.scale})`;
  document.getElementById('zoomLabel').textContent = Math.round(zoomState.scale * 100) + '%';
  
  const container = document.getElementById('pageContainer');
  const rect = wrapper.getBoundingClientRect();
  
  // 확대(scale)로 인해 늘어난 크기를 계산하여 오른쪽과 아래에 강제 마진 부여 (스크롤 잘림 방지)
  const extraWidth = rect.width - wrapper.offsetWidth;
  const extraHeight = rect.height - wrapper.offsetHeight;
  
  wrapper.style.marginRight = `${Math.max(0, extraWidth) + 40}px`; 
  wrapper.style.marginBottom = `${Math.max(0, extraHeight) + 60}px`;
  
  // 화면이 컨테이너보다 작을 때는 자동으로 가운데 정렬, 크면 좌측 20px 여백 적용
  if (rect.width < container.clientWidth) {
    wrapper.style.marginLeft = `${(container.clientWidth - rect.width) / 2}px`;
  } else {
    wrapper.style.marginLeft = '20px';
  }
}

window.addEventListener('resize', () => {
  if (zoomState.mode === 'width' || zoomState.mode === 'height') setZoom(zoomState.mode);
  updateToolbarMode();
});
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    if (zoomState.mode === 'width' || zoomState.mode === 'height') setZoom(zoomState.mode);
  });
}

/* ===== 툴바 반응형 계산 ===== */
function updateToolbarMode() {
  const toolbar = document.getElementById('toolbar');
  const toolbarMenu = document.getElementById('toolbarMenu');
  const title = document.querySelector('.toolbar-title');
  const docGroup = document.querySelector('.document-group');
  const zoomGroup = document.querySelector('.zoom-group');
  const actionGroup = document.querySelector('.action-group');
  
  toolbar.classList.remove('compact');
  toolbarMenu.classList.remove('open');
  
  const availableW = toolbar.clientWidth;
  const titleW = title.offsetWidth;
  const docW = docGroup.offsetWidth;
  const zoomW = zoomGroup.offsetWidth;
  const actionW = actionGroup.offsetWidth;
  
  const leftOccupied = titleW + 16 + docW + 30; 
  const rightOccupied = actionW + 20;
  
  const zoomStart = (availableW / 2) - (zoomW / 2);
  const zoomEnd = (availableW / 2) + (zoomW / 2);
  const rightStart = availableW - rightOccupied;
  
  let needsCompact = false;
  if (leftOccupied > zoomStart || zoomEnd > rightStart || availableW < 800) {
    needsCompact = true;
  }
  
  if (needsCompact) toolbar.classList.add('compact');
}

function toggleMenu() {
  const toolbar = document.getElementById('toolbar');
  if (!toolbar.classList.contains('compact')) return;
  document.getElementById('toolbarMenu').classList.toggle('open');
}

function closeMenuOnCompact() {
  const toolbar = document.getElementById('toolbar');
  if (toolbar.classList.contains('compact')) document.getElementById('toolbarMenu').classList.remove('open');
}

/* ===== 액션 ===== */
function newDocument() {
  if (confirm('모든 내용이 지워집니다. 새로 시작할까요?')) {
    state.chars = []; state.cursorPos = 0; state.selectionStart = 0; state.selectionEnd = 0; state.composing = false;
    historyStack = []; historyIndex = -1; saveHistory(true); 
    
    // 새 문서 시작 시 경고창 숨기기
    const warningEl = document.getElementById('truncateWarning');
    if (warningEl) {
      warningEl.style.display = 'none';
      document.getElementById('pageContainer').style.top = 'var(--toolbar-height)';
    }

    render(); saveToURL(); syncInputFromState(); focusInput(); closeMenuOnCompact();
  }
}

function changeFont(v) { state.font = v; document.documentElement.style.setProperty('--font-family', v); render(); saveToURL(); }
function changeColor(btn) {
  document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
  state.color = btn.dataset.color; document.documentElement.style.setProperty('--grid-color', state.color); saveToURL();
}
function doPrint() { closeMenuOnCompact(); setTimeout(() => window.print(), 100); }
function copyURL() { navigator.clipboard.writeText(location.href).then(() => showToast('현재 문서 주소가 복사되었습니다.')); closeMenuOnCompact(); }
function copyText() {
  const text = hasSelection() ? getSelectedText() : state.chars.join('');
  navigator.clipboard.writeText(text).then(() => showToast(hasSelection() ? '선택한 텍스트가 복사되었습니다.' : '텍스트가 복사되었습니다.'));
  closeMenuOnCompact();
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

  /* ===== PC 드래그 패닝 & 모바일 핀치 줌 ===== */
const pageContainerEl = document.getElementById('pageContainer');

// [1] PC 마우스 드래그로 화면 상하좌우 이동 기능
let isPanning = false;
let startPanX = 0, startPanY = 0;
let startScrollLeft = 0, startScrollTop = 0;

pageContainerEl.addEventListener('mousedown', (e) => {
  // 툴바 클릭이거나, 왼쪽 마우스 버튼이 아니면 무시
  if (e.button !== 0 || e.target.closest('.toolbar') || e.target.tagName === 'BUTTON') return;
  isPanning = true;
  startPanX = e.clientX;
  startPanY = e.clientY;
  startScrollLeft = pageContainerEl.scrollLeft;
  startScrollTop = pageContainerEl.scrollTop;
  pageContainerEl.style.cursor = 'grabbing';
});

window.addEventListener('mousemove', (e) => {
  if (!isPanning) return;
  e.preventDefault(); // 텍스트 선택 등 방지
  pageContainerEl.scrollLeft = startScrollLeft - (e.clientX - startPanX);
  pageContainerEl.scrollTop = startScrollTop - (e.clientY - startPanY);
});

window.addEventListener('mouseup', () => {
  if (isPanning) {
    isPanning = false;
    pageContainerEl.style.cursor = '';
  }
});

// [2] 모바일 두 손가락 핀치 줌 기능
let initialPinchDistance = null;
let initialZoomScale = 1;

pageContainerEl.addEventListener('touchstart', (e) => {
  if (e.touches.length === 2) {
    initialPinchDistance = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    initialZoomScale = zoomState.scale;
  }
}, { passive: true });

pageContainerEl.addEventListener('touchmove', (e) => {
  if (e.touches.length === 2 && initialPinchDistance) {
    e.preventDefault(); // 브라우저 기본 스크롤 및 화면 튕김 방지
    const currentDistance = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    const ratio = currentDistance / initialPinchDistance;
    let newScale = initialZoomScale * ratio;
    
    // 확대/축소 제한 범위 (0.25배 ~ 3배)
    newScale = Math.min(3.0, Math.max(0.25, newScale));
    zoomState.mode = 'custom';
    zoomState.scale = newScale;
    
    applyZoom();
  }
}, { passive: false });

pageContainerEl.addEventListener('touchend', (e) => {
  if (e.touches.length < 2) {
    initialPinchDistance = null;
  }
});

  
/* ===== 초기화 ===== */
document.addEventListener('DOMContentLoaded', () => {
  loadFromURL(); applySettings(); render(); syncInputFromState();
  saveHistory(true);

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      initMobileZoom(); updateToolbarMode();
    });
  });
});
</script>
