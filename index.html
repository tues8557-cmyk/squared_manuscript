<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>표준 400자 원고지 에디터</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo&display=swap" rel="stylesheet">
    <style>
        :root {
            --grid-color: #ff6b6b;
            --cell-size: 8.5mm; /* A4 폭에 맞춘 최적 사이즈 */
        }

        body { margin: 0; padding: 0; background: #525659; font-family: 'Nanum Myeongjo', serif; }

        /* 상단 툴바 */
        #toolbar {
            position: fixed; top: 0; width: 100%; height: 50px;
            background: #fff; border-bottom: 1px solid #ddd;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; z-index: 1000; box-sizing: border-box;
        }

        .btn { cursor: pointer; padding: 6px 12px; border: 1px solid #ccc; background: #fff; border-radius: 4px; font-size: 14px; }

        /* 페이지 레이아웃 */
        #app { margin-top: 70px; display: flex; flex-direction: column; align-items: center; gap: 30px; padding-bottom: 50px; }

        .page {
            width: 210mm; height: 297mm;
            background: #fff; box-shadow: 0 0 15px rgba(0,0,0,0.3);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; /* 중앙 정렬로 남는 여백 처리 */
            box-sizing: border-box;
            page-break-after: always;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(20, var(--cell-size));
            grid-template-rows: repeat(20, var(--cell-size));
            border: 1.5px solid var(--grid-color);
            background-color: var(--grid-color);
            gap: 0.5px; /* 선 두께 대용 */
        }

        .cell {
            background: #fff;
            width: var(--cell-size);
            height: var(--cell-size);
            display: flex; justify-content: center; align-items: center;
            font-size: 18px; /* 글자 크기 고정 (원고지 규격) */
            font-weight: 500;
            outline: none;
            cursor: text;
            box-sizing: border-box;
        }

        .cell:focus { background-color: #fff9db; }

        @media print {
            body { background: none; }
            #toolbar { display: none; }
            #app { margin: 0; padding: 0; }
            .page { box-shadow: none; margin: 0; }
        }

        /* 모바일 스케일 조정 */
        @media (max-width: 210mm) {
            #app { transform: scale(0.45); transform-origin: top center; margin-top: 10px; }
        }
    </style>
</head>
<body>

<header id="toolbar">
    <button class="btn" onclick="newDocument()">📄 새 원고지</button>
    <div id="fontIndicator" style="font-size: 14px; color: #666;">표준 400자 (20x20)</div>
    <div class="btn" onclick="window.print()">공유 / PDF 저장</div>
</header>

<div id="app"></div>

<script>
    const app = document.getElementById('app');
    const COLS = 20;
    const ROWS = 20;
    const CELLS_PER_PAGE = COLS * ROWS;
    let cellCounter = 0;

    function createPage() {
        const page = document.createElement('div');
        page.className = 'page';
        
        const grid = document.createElement('div');
        grid.className = 'grid-container';

        for (let i = 0; i < CELLS_PER_PAGE; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.contentEditable = "true";
            cell.dataset.index = cellCounter++;

            cell.addEventListener('compositionend', handleInput); // 한글 조합 완료 시
            cell.addEventListener('input', (e) => {
                if(!e.isComposing) handleInput(e); // 일반 문자/공백 입력 시
            });
            cell.addEventListener('keydown', handleKeyDown);

            grid.appendChild(cell);
        }
        page.appendChild(grid);
        app.appendChild(page);
    }

    function handleInput(e) {
        const cell = e.target;
        const index = parseInt(cell.dataset.index);

        if (cell.innerText.length > 0) {
            // 한 글자만 남기기 (완성형)
            cell.innerText = cell.innerText.trim().charAt(0);
            
            // 마지막 칸이면 새 페이지
            if (index === cellCounter - 1) createPage();

            // 다음 칸으로 이동
            const next = document.querySelector(`.cell[data-index="${index + 1}"]`);
            if (next) {
                next.focus();
                next.scrollIntoView({ behavior: "smooth", block: "center" });
            }
        }
        autoSave();
    }

    function handleKeyDown(e) {
        const cell = e.target;
        const index = parseInt(cell.dataset.index);

        // 1. 엔터 키: 다음 줄 첫 칸으로 이동
        if (e.key === 'Enter') {
            e.preventDefault();
            const currentLine = Math.floor(index / COLS);
            const nextLineFirstIndex = (currentLine + 1) * COLS;
            
            if (nextLineFirstIndex >= cellCounter) createPage();
            
            const nextLineCell = document.querySelector(`.cell[data-index="${nextLineFirstIndex}"]`);
            if (nextLineCell) nextLineCell.focus();
        }

        // 2. 백스페이스: 앞 칸으로 이동하며 지우기
        if (e.key === 'Backspace' && cell.innerText === '' && index > 0) {
            e.preventDefault();
            const prev = document.querySelector(`.cell[data-index="${index - 1}"]`);
            if (prev) {
                prev.innerText = '';
                prev.focus();
            }
        }
    }

    function autoSave() {
        const cells = document.querySelectorAll('.cell');
        const content = Array.from(cells).map(c => c.innerText || " ").join("").replace(/\s+$/, "");
        window.location.hash = encodeURIComponent(btoa(encodeURIComponent(content)));
    }

    function loadData() {
        if (window.location.hash) {
            try {
                const decoded = decodeURIComponent(atob(decodeURIComponent(window.location.hash.substring(1))));
                const pagesNeeded = Math.ceil(decoded.length / CELLS_PER_PAGE) || 1;
                for(let i=1; i < pagesNeeded; i++) createPage();

                const cells = document.querySelectorAll('.cell');
                decoded.split("").forEach((char, i) => {
                    if (cells[i]) cells[i].innerText = char === " " ? "" : char;
                });
            } catch (e) {}
        }
    }

    function newDocument() {
        if (confirm("내용을 모두 지우고 새로 작성하시겠습니까?")) {
            window.location.hash = "";
            location.reload();
        }
    }

    // 초기 실행
    createPage();
    loadData();
</script>

</body>
</html>
