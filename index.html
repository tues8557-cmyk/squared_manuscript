<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>정밀 재현 400자 원고지 v5</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo&display=swap" rel="stylesheet">
    <style>
        :root { --grid-color: #ff6b6b; --cell-size: 8.8mm; --line-gap: 3mm; }
        body { margin: 0; padding: 0; background: #525659; font-family: 'Nanum Myeongjo', serif; }

        #toolbar {
            position: fixed; top: 0; width: 100%; height: 50px;
            background: #fff; border-bottom: 1px solid #ddd;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; z-index: 1000; box-sizing: border-box;
        }
        .btn { cursor: pointer; padding: 6px 12px; border: 1px solid #ccc; background: #fff; border-radius: 4px; font-size: 13px; }

        #app { margin-top: 60px; display: flex; flex-direction: column; align-items: center; gap: 30px; padding-bottom: 50px; }
        .page {
            width: 210mm; height: 297mm; background: #fff;
            padding: 15mm 15mm; box-sizing: border-box;
            display: flex; flex-direction: column; page-break-after: always;
        }

        .page-header {
            width: 100%; border-top: 1.5px solid var(--grid-color);
            border-bottom: 0.5px solid var(--grid-color);
            padding: 2px 0; margin-bottom: 5px;
            display: flex; justify-content: flex-end; align-items: flex-end;
            font-size: 16px; color: #000; height: 30px;
        }
        .page-header .no-area { font-weight: bold; margin-bottom: 2px; }
        .page-header .page-num { min-width: 40px; text-align: center; border-bottom: 1px solid #000; margin-left: 10px; font-size: 20px; }

        .wongoji-body { border: 1.5px solid var(--grid-color); display: flex; flex-direction: column; }
        .wongoji-row { display: flex; border-bottom: 1px solid var(--grid-color); }
        .wongoji-row:last-child { border-bottom: none; }
        .row-gap { height: var(--line-gap); border-bottom: 1px solid var(--grid-color); background: #fff; }

        .cell {
            width: var(--cell-size); height: var(--cell-size);
            border-right: 1px solid var(--grid-color);
            display: flex; justify-content: center; align-items: center;
            font-size: 20px; outline: none; background: #fff; box-sizing: border-box;
            overflow: hidden; white-space: nowrap;
        }
        .cell:last-child { border-right: none; }
        .cell:focus { background-color: #fff9db; }

        .bottom-blank { flex-grow: 1; border: 1.5px solid var(--grid-color); border-top: none; margin-top: -1.5px; }

        @media print {
            body { background: none; } #toolbar { display: none; }
            #app { margin: 0; padding: 0; } .page { box-shadow: none; }
        }
    </style>
</head>
<body>

<header id="toolbar">
    <button class="btn" onclick="newDocument()">📄 새 원고지</button>
    <div style="display: flex; gap: 8px;">
        <button class="btn" onclick="changeColor('#ff6b6b')" style="color:#ff6b6b">빨강</button>
        <button class="btn" onclick="changeColor('#444')" style="color:#444">회색</button>
        <button class="btn" onclick="changeColor('#000')" style="color:#000">검정</button>
    </div>
    <button class="btn" onclick="window.print()">저장 / 인쇄</button>
</header>

<div id="app"></div>

<script>
    const app = document.getElementById('app');
    const COLS = 20, ROWS = 20;
    let cellCounter = 0;
    let pageCounter = 0;
    let isComposing = false; // IME 조합 상태 추적

    function createPage() {
        pageCounter++;
        const page = document.createElement('div');
        page.className = 'page';
        page.innerHTML = `<div class="page-header"><div class="no-area">NO.</div><div class="page-num">${pageCounter}</div></div>`;

        const bodyContainer = document.createElement('div');
        bodyContainer.className = 'wongoji-body';

        for (let r = 0; r < ROWS; r++) {
            const row = document.createElement('div');
            row.className = 'wongoji-row';
            for (let c = 0; c < COLS; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.contentEditable = "true";
                cell.dataset.index = cellCounter++;
                
                // [개선] IME 상태 관리
                cell.addEventListener('compositionstart', () => { isComposing = true; });
                cell.addEventListener('compositionend', (e) => {
                    isComposing = false;
                    // 조합 완료 후 한 글자 초과분 제거 및 이동
                    setTimeout(() => {
                        finalizeCell(e.target);
                        moveFocus(parseInt(e.target.dataset.index) + 1);
                    }, 10);
                });

                cell.addEventListener('input', (e) => {
                    if (!isComposing) {
                        finalizeCell(e.target);
                        if (e.data) moveFocus(parseInt(e.target.dataset.index) + 1);
                    }
                    autoSave();
                });

                cell.addEventListener('keydown', handleKeyNavigation);
                // 클릭 시 커서를 항상 마지막으로
                cell.addEventListener('click', () => {
                    const range = document.createRange();
                    const sel = window.getSelection();
                    range.selectNodeContents(cell);
                    range.collapse(false);
                    sel.removeAllRanges();
                    sel.addRange(range);
                });

                row.appendChild(cell);
            }
            bodyContainer.appendChild(row);
            if (r < ROWS - 1) {
                const gap = document.createElement('div');
                gap.className = 'row-gap';
                bodyContainer.appendChild(gap);
            }
        }
        page.appendChild(bodyContainer);
        const blank = document.createElement('div');
        blank.className = 'bottom-blank';
        page.appendChild(blank);
        app.appendChild(page);
    }

    function finalizeCell(cell) {
        if (cell.innerText.length > 1) {
            cell.innerText = cell.innerText.trim().charAt(0);
        }
    }

    function handleKeyNavigation(e) {
        const index = parseInt(e.target.dataset.index);
        let nextIndex = -1;

        if (e.key === 'ArrowRight') nextIndex = index + 1;
        if (e.key === 'ArrowLeft') nextIndex = index - 1;
        if (e.key === 'ArrowDown') nextIndex = index + COLS;
        if (e.key === 'ArrowUp') nextIndex = index - COLS;
        if (e.key === 'Enter') { e.preventDefault(); nextIndex = (Math.floor(index / COLS) + 1) * COLS; }
        
        // 백스페이스 처리
        if (e.key === 'Backspace' && e.target.innerText === '' && index > 0) {
            e.preventDefault();
            const prev = getCell(index - 1);
            if(prev) { prev.innerText = ''; prev.focus(); }
            return;
        }

        // [수정] Delete 키 처리: 현재 칸 지우기 (커서 유지)
        if (e.key === 'Delete') {
            e.target.innerText = '';
            autoSave();
        }

        if (nextIndex >= 0 && !isComposing) {
            e.preventDefault();
            moveFocus(nextIndex);
        }
    }

    function moveFocus(index) {
        if (index >= cellCounter) createPage();
        const target = getCell(index);
        if (target) {
            target.focus();
            // 모바일 키보드 가림 방지
            target.scrollIntoView({ behavior: "smooth", block: "center" });
        }
    }

    function getCell(index) { return document.querySelector(`.cell[data-index="${index}"]`); }
    function changeColor(color) { document.documentElement.style.setProperty('--grid-color', color); }

    function autoSave() {
        const cells = document.querySelectorAll('.cell');
        const content = Array.from(cells).map(c => c.innerText || " ").join("").replace(/\s+$/, "");
        window.location.hash = encodeURIComponent(btoa(encodeURIComponent(content)));
    }

    function loadData() {
        if (window.location.hash) {
            try {
                const decoded = decodeURIComponent(atob(decodeURIComponent(window.location.hash.substring(1))));
                const pagesNeeded = Math.ceil(decoded.length / (COLS*ROWS)) || 1;
                for(let i=1; i < pagesNeeded; i++) createPage();
                const cells = document.querySelectorAll('.cell');
                decoded.split("").forEach((char, i) => { if (cells[i]) cells[i].innerText = char === " " ? "" : char; });
            } catch (e) {}
        }
    }

    function newDocument() { if (confirm("새로 작성하시겠습니까?")) { window.location.hash = ""; location.reload(); } }

    createPage();
    loadData();
</script>
</body>
</html>
